<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThoughtJunkie — Frienduit Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#030712; --surface:#0c1527; --surface2:#111827;
  --border:#1e2d45; --border2:#263550;
  --text:#e2e8f0; --text-dim:#64748b;
  --accent:#7c3aed; --accent2:#a78bfa; --accent-glow:rgba(124,58,237,.35);
  --green:#10b981; --blue:#3b82f6; --amber:#f59e0b; --red:#ef4444;
  --panel-w:320px; --topbar-h:54px;
  --font-ui:'Syne',sans-serif; --font-mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);overflow:hidden;-webkit-font-smoothing:antialiased;}

/* Stars */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 40%,rgba(124,58,237,.07) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 65%,rgba(59,130,246,.04) 0%,transparent 50%),var(--bg);}
#stars::before{content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 12% 18%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 7%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 68% 33%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 11%,rgba(255,255,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 4% 74%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 51% 89%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(2px 2px at 33% 43%,rgba(167,139,250,.5) 0%,transparent 100%),
    radial-gradient(2px 2px at 76% 22%,rgba(167,139,250,.4) 0%,transparent 100%);
  animation:twinkle 9s ease-in-out infinite alternate;}
@keyframes twinkle{0%{opacity:.4}50%{opacity:1}100%{opacity:.6}}

/* Top Bar */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);
  background:rgba(3,7,18,.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--accent2);letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}
.div-line{width:1px;height:22px;background:var(--border2);flex-shrink:0;}
.map-meta{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1;}
.map-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.map-author{font-size:11px;color:var(--text-dim);font-family:var(--font-mono);}
.collab-bar{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--font-mono);color:var(--green);border:1px solid rgba(16,185,129,.3);padding:3px 8px;border-radius:20px;background:rgba(16,185,129,.08);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:plive 2s ease infinite;}
@keyframes plive{0%,100%{opacity:1}50%{opacity:.6}}
.avatar-stack{display:flex;}
.avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--bg);margin-left:-6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;position:relative;cursor:pointer;transition:transform .2s;}
.avatar:first-child{margin-left:0;}
.avatar:hover{transform:translateY(-2px);z-index:10;}
.avatar-tip{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);padding:3px 8px;border-radius:5px;font-size:10px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s;}
.avatar:hover .avatar-tip{opacity:1;}
.topbar-actions{display:flex;gap:6px;flex-shrink:0;}
.btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;font-size:12px;font-family:var(--font-ui);font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface2);color:var(--text);}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 16px var(--accent-glow);}
.btn-primary:hover{background:#6d28d9;}
.btn-fork{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3);}
.btn-fork:hover{background:rgba(59,130,246,.25);}

/* Update flash banner */
#update-banner{position:fixed;top:var(--topbar-h);left:0;right:0;z-index:90;
  background:linear-gradient(90deg,rgba(16,185,129,.15),rgba(16,185,129,.08));
  border-bottom:1px solid rgba(16,185,129,.3);
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:8px;font-size:12px;color:var(--green);font-weight:600;
  transform:translateY(-100%);transition:transform .4s cubic-bezier(.4,0,.2,1);}
#update-banner.show{transform:translateY(0);}
.update-pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:plive 1s ease infinite;}

/* Canvas */
#canvas-wrap{position:fixed;inset:0;top:var(--topbar-h);z-index:1;cursor:grab;}
#canvas-wrap.grabbing{cursor:grabbing;}
#map-canvas{display:block;width:100%;height:100%;}

/* Detail Panel */
#detail-panel{position:fixed;top:var(--topbar-h);right:0;width:var(--panel-w);height:calc(100% - var(--topbar-h));
  background:rgba(9,18,36,.96);backdrop-filter:blur(28px);border-left:1px solid var(--border);
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:50;}
#detail-panel.open{transform:translateX(0);}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.panel-title{font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;}
.panel-close{width:26px;height:26px;border-radius:6px;background:var(--surface2);border:1px solid var(--border2);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;}
.panel-close:hover{background:var(--border2);color:var(--text);}
.panel-body{padding:20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;}
.color-strip{height:3px;border-radius:2px;margin-bottom:2px;}
.node-big-text{font-size:20px;font-weight:700;line-height:1.25;letter-spacing:-.4px;}
.node-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.tag{font-size:10px;font-family:var(--font-mono);padding:2px 7px;border-radius:10px;background:var(--surface2);border:1px solid var(--border2);color:var(--text-dim);}
.sec-lbl{font-size:10px;font-weight:600;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* Image in panel */
.node-image-preview{width:100%;border-radius:8px;overflow:hidden;border:1px solid var(--border2);}
.node-image-preview img{width:100%;display:block;max-height:180px;object-fit:cover;}

/* Journal */
.journal-wrap{background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.2);border-radius:8px;padding:14px;}
.journal-content{font-family:'Crimson Pro',serif;font-size:15px;line-height:1.75;color:rgba(226,232,240,.85);font-style:italic;}
.journal-content p{margin:0;}
.journal-content strong{font-style:normal;color:var(--accent2);}

/* Tasks */
.task-row{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);margin-bottom:5px;font-size:12px;}
.task-check{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--text-dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff;}
.task-progress{height:3px;border-radius:2px;background:var(--border2);overflow:hidden;margin-bottom:10px;}
.task-progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s;}
.task-txt.done{text-decoration:line-through;color:var(--text-dim);}

/* Files */
.file-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);margin-bottom:5px;cursor:pointer;transition:border-color .2s;}
.file-row:hover{border-color:var(--border2);}
.file-icon{font-size:18px;flex-shrink:0;}
.file-info{flex:1;min-width:0;}
.file-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-size{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);}
.file-badge{font-size:9px;padding:2px 6px;border-radius:8px;background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.2);white-space:nowrap;}

/* Date pins */
.pin-row{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:7px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);font-size:11px;font-family:var(--font-mono);color:var(--accent2);margin-bottom:4px;}

/* Mood badge */
.mood-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:4px;}

/* Collab panel */
#collab-panel{position:fixed;bottom:76px;right:20px;width:232px;background:rgba(9,18,36,.96);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:10px;z-index:50;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.collab-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;}
.collab-users{padding:8px;display:flex;flex-direction:column;gap:3px;}
.cu-row{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:6px;}
.cu-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cu-name{font-size:12px;font-weight:500;flex:1;}
.cu-act{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);}
.collab-ticker{padding:8px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--text-dim);font-family:var(--font-mono);min-height:28px;}

/* Zoom */
#zoom-controls{position:fixed;bottom:20px;right:20px;display:flex;gap:4px;z-index:50;}
.zbtn{width:36px;height:36px;border-radius:8px;background:rgba(9,18,36,.92);backdrop-filter:blur(16px);border:1px solid var(--border2);color:var(--text);cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.zbtn:hover{background:var(--surface2);border-color:var(--accent);color:var(--accent2);}
.zlevel{min-width:52px;height:36px;border-radius:8px;background:rgba(9,18,36,.92);backdrop-filter:blur(16px);border:1px solid var(--border2);color:var(--text-dim);display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--font-mono);}

/* Minimap */
#minimap-wrap{position:fixed;bottom:20px;left:20px;z-index:50;border-radius:8px;overflow:hidden;border:1px solid var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.5);}

/* Tooltip */
#tooltip{position:fixed;z-index:80;background:rgba(9,18,36,.97);backdrop-filter:blur(16px);border:1px solid var(--border2);border-radius:8px;padding:7px 12px;pointer-events:none;opacity:0;transition:opacity .15s;max-width:220px;}
#tooltip.vis{opacity:1;}
.tt-text{font-size:13px;font-weight:600;}
.tt-sub{font-size:10px;color:var(--text-dim);margin-top:2px;font-family:var(--font-mono);}

/* Toast */
#toast{position:fixed;top:calc(var(--topbar-h) + 14px);left:50%;transform:translateX(-50%);background:rgba(9,18,36,.97);backdrop-filter:blur(16px);border:1px solid var(--border2);border-radius:8px;padding:9px 20px;font-size:12px;z-index:200;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}

/* Cursor labels */
.cursor-lbl{position:fixed;pointer-events:none;z-index:70;font-size:11px;font-family:var(--font-ui);font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;transform:translate(13px,5px);}

/* Share Modal */
#share-modal{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#share-modal.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:28px;width:420px;max-width:90vw;box-shadow:0 24px 64px rgba(0,0,0,.6);transform:scale(.95);transition:transform .3s cubic-bezier(.34,1.56,.64,1);position:relative;}
#share-modal.open .modal-box{transform:scale(1);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--text-dim);margin-bottom:18px;}
.share-url-row{display:flex;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;margin-bottom:14px;align-items:center;}
.share-url{flex:1;font-size:12px;font-family:var(--font-mono);color:var(--accent2);background:none;border:none;outline:none;overflow:hidden;text-overflow:ellipsis;}
.copy-btn{font-size:11px;font-weight:600;cursor:pointer;padding:3px 10px;border-radius:5px;background:var(--border2);border:none;font-family:var(--font-ui);color:var(--text-dim);transition:all .2s;}
.copy-btn:hover{background:var(--accent);color:#fff;}
.share-platforms{display:flex;gap:8px;}
.plat-btn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-family:var(--font-ui);transition:all .2s;text-align:center;}
.plat-btn:hover{border-color:var(--accent);color:var(--accent2);}
.modal-x{position:absolute;top:16px;right:16px;width:28px;height:28px;border-radius:6px;background:var(--surface2);border:1px solid var(--border2);color:var(--text-dim);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}

/* Node highlight animation on update */
@keyframes node-flash{0%{transform:scale(1.15);opacity:.6}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="stars"></div>

<!-- Update banner -->
<div id="update-banner">
  <div class="update-pulse"></div>

</div>

  <div class="logo"><div class="logo-dot"></div>Frienduit</div>

    <button class="btn btn-primary" onclick="showToast('✏️ Edit mode — coming soon in beta!')">✏️ Edit</button>
  </div>

<!-- Canvas -->

</div>

<!-- Detail Panel -->

  <div class="zlevel" id="zlabel">100%</div>
  <button class="zbtn" onclick="zoomIn()">+</button>

</div>

<!-- Minimap -->

<!-- Share Modal -->

    <div class="modal-x" onclick="closeShareModal()">✕</div>
    <div class="modal-title">Share this Mind Map</div>
    <div class="modal-sub">Anyone with the link can view and comment</div>
    <div class="share-url-row">
      <input class="share-url" id="share-url-val" readonly value="https://frienduit.com/m/tj-demo-001">
      <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>
    <div class="share-platforms">
      <button class="plat-btn" onclick="showToast('Opening X…')">🐦 X</button>
      <button class="plat-btn" onclick="showToast('Opening LinkedIn…')">💼 LinkedIn</button>
      <button class="plat-btn" onclick="copyLink()">🔗 Copy Link</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════
   PERFORMANCE NOTES
   ─────────────────
   OPT-1  hexRGB()       → RGB_CACHE  (parse once, reuse forever)
   OPT-2  bezPts()       → CONN_PTS   (positions fixed in viewer, cache forever)
   OPT-3  Glow           → GLOW_CACHE (OffscreenCanvas per color+intensity+size)
   OPT-4  Text wrap      → TEXT_CACHE (measureText result cached per node)
   OPT-5  taperPath      → 20 steps instead of 40; batch same-width polylines
   OPT-6  neon_glow conn → 3 layers instead of 5, reuse cached pts
   OPT-7  Minimap        → dirty flag, redraw only when viewport shifts ≥1px
   OPT-8  Lerp           → early-exit when already at target (< 0.05px)
   OPT-9  Idle RAF       → drop to ~20fps via setTimeout when nothing animating
   OPT-10 DOM cache      → all getElementById results cached at boot
   OPT-11 Cursor DOM     → only write style when position changed > 2px
   OPT-12 Hit test       → iterate backwards in-place (no array copy)
═══════════════════════════════════════════════════════════ */
const MAP_ID = 'tj-demo-001';

    {id:4,text:"AI Expand",x:-290,y:160,color:"#ec4899",shape:"diamond",intensity:4,size:105,

    {id:5,text:"Frienduit Portal",x:290,y:160,color:"#f59e0b",shape:"circle",intensity:4,size:105,

// ── OPT-1: RGB cache ─────────────────────────────────────
const RGB_CACHE={};
function hexRGB(h){if(RGB_CACHE[h])return RGB_CACHE[h];return RGB_CACHE[h]={r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
const RGBA_CACHE={},LIGHTEN_CACHE={};
function rgba(h,a){const k=h+'|'+a;if(RGBA_CACHE[k])return RGBA_CACHE[k];const{r,g,b}=hexRGB(h);return RGBA_CACHE[k]=`rgba(${r},${g},${b},${a})`;}
function lighten(h,p){const k=h+'|'+p;if(LIGHTEN_CACHE[k])return LIGHTEN_CACHE[k];const{r,g,b}=hexRGB(h),f=1+p/100;return LIGHTEN_CACHE[k]=`rgb(${Math.min(255,r*f|0)},${Math.min(255,g*f|0)},${Math.min(255,b*f|0)})`;}
function lerp(a,b,t){return a+(b-a)*t;}
function toScreen(sx,sy){return{x:sx*zoom+panX+canvas.width/2,y:sy*zoom+panY+canvas.height/2};}
function toScene(cx,cy){return{x:(cx-panX-canvas.width/2)/zoom,y:(cy-panY-canvas.height/2)/zoom};}

/* ─── Shapes ───────────────────────────────────── */
function shapePath(c,x,y,r,shape){
  c.beginPath();
  if(shape==='square'){c.rect(x-r,y-r,r*2,r*2);}
  else if(shape==='diamond'){c.moveTo(x,y-r);c.lineTo(x+r,y);c.lineTo(x,y+r);c.lineTo(x-r,y);c.closePath();}
  else if(shape==='hexagon'){for(let i=0;i<6;i++){const a=Math.PI/3*i;i?c.lineTo(x+r*Math.cos(a),y+r*Math.sin(a)):c.moveTo(x+r*Math.cos(a),y+r*Math.sin(a));}c.closePath();}
  else if(shape==='heart'){c.moveTo(x,y+r*.5);c.bezierCurveTo(x-r,y+r*.25,x-r,y-r*.16,x-r*.5,y-r*.33);c.bezierCurveTo(x-r*.25,y-r*.44,x,y-r*.42,x,y-r*.25);c.bezierCurveTo(x,y-r*.42,x+r*.25,y-r*.44,x+r*.5,y-r*.33);c.bezierCurveTo(x+r,y-r*.16,x+r,y+r*.25,x,y+r*.5);c.closePath();}
  else{c.arc(x,y,r,0,Math.PI*2);}
}

// ── OPT-3: Pre-baked glow via OffscreenCanvas ─────────────
const GLOW_CACHE={};
function getGlowCanvas(color,intensity,r){
  const sc=Math.round(r/8)*8,key=`${color}|${intensity}|${sc}`;
  if(GLOW_CACHE[key])return GLOW_CACHE[key];
  const layers=Math.min(3+intensity,6),spread=intensity*26;
  const maxRad=r+(r*.4)+spread*1.5+5,dim=Math.ceil(maxRad*2)+4;
  const oc=new OffscreenCanvas(dim,dim),oc2=oc.getContext('2d');
  const cx=dim/2,cy=dim/2;
  for(let i=0;i<layers;i++){
    const lf=i/layers,gi=(1-lf)**2,rad=r+(r*.4)+spread*lf*1.5;
    const al=gi*(0.1+(intensity/5)*.22);
    const g=oc2.createRadialGradient(cx,cy,0,cx,cy,rad);
    g.addColorStop(0,rgba(color,al));g.addColorStop(.5,rgba(color,al*.4));g.addColorStop(1,rgba(color,0));
    oc2.fillStyle=g;oc2.beginPath();oc2.arc(cx,cy,rad,0,Math.PI*2);oc2.fill();
  }
  return GLOW_CACHE[key]={canvas:oc,dim};
}
function drawGlow(x,y,r,color,intensity,pulse){
  if(!intensity)return;
  const{canvas:gc,dim}=getGlowCanvas(color,intensity,r);
  const d=dim*(1+pulse*.04),half=d/2;
  ctx.drawImage(gc,x-half,y-half,d,d);
}

// ── OPT-2: Connection point cache ────────────────────────
// CONN_PTS declared above near normaliseNodes
const STEPS=20; // was 40
function bezPts(x1,y1,x2,y2){
  const key=`${x1|0},${y1|0},${x2|0},${y2|0}`;
  if(CONN_PTS[key])return CONN_PTS[key];
  const pts=[],dx=x2-x1,dy=y2-y1,cx2=x1+dx*.5,cy2=y1+dy*.3;
  for(let i=0;i<=STEPS;i++){const t=i/STEPS;pts.push([(1-t)**2*x1+2*(1-t)*t*cx2+t**2*x2,(1-t)**2*y1+2*(1-t)*t*cy2+t**2*y2]);}
  return CONN_PTS[key]=pts;
}

// ── OPT-5: taperPath — 4 width buckets instead of N strokes ──
function taperPath(pts,wS,wE,color,alpha=200){
  const{r,g,b}=hexRGB(color);
  const ss=`rgba(${r},${g},${b},${(alpha/255).toFixed(3)})`;
  const n=pts.length-1,BUCKETS=4;
  let prevB=-1;
  ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle=ss;
  for(let i=0;i<n;i++){
    const t=i/n,w=Math.max(.5,wS+(wE-wS)*t);
    const b2=Math.round(t*(BUCKETS-1));
    if(b2!==prevB){if(prevB>=0)ctx.stroke();ctx.beginPath();ctx.lineWidth=w;ctx.moveTo(pts[i][0],pts[i][1]);prevB=b2;}
    ctx.lineTo(pts[i+1][0],pts[i+1][1]);
  }
  if(prevB>=0)ctx.stroke();
}
function nw(n){return Math.max(1,4*Math.max(.25,Math.min(4,n.size/100)));}

function drawConn(x1,y1,x2,y2,fn,tn,style,t){
  const wf=nw(fn),wt=nw(tn);
  switch(style){
    case 'neon_glow':{
      const pts=bezPts(x1,y1,x2,y2),p=Math.sin(t*2)*.3+.7;
      taperPath(pts,wf+8*p,wt+8*p,fn.color,28);
      taperPath(pts,wf+3*p,wt+3*p,fn.color,65);
      taperPath(pts,wf,wt,fn.color,155);
      const{r,g,b}=hexRGB('#ffffff');
      ctx.strokeStyle=`rgba(${r},${g},${b},${220/255})`;ctx.lineWidth=Math.max(.5,wf*.5);ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
      for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();break;}
    case 'energy_pulse':{
      const pts=bezPts(x1,y1,x2,y2);taperPath(pts,wf,wt,fn.color,200);
      const pp=(t/3)%1,px=x1+(x2-x1)*pp,py=y1+(y2-y1)*pp;
      const{r,g,b}=hexRGB(fn.color);
      for(let i=0;i<3;i++){const sz=Math.max(2,wf*(3-i)*2.5);ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);
        ctx.fillStyle=`rgba(${Math.min(255,r*1.6|0)},${Math.min(255,g*1.6|0)},${Math.min(255,b*1.6|0)},${(150*(3-i)/3)/255})`;ctx.fill();}break;}
    case 'electric':{
      const pts=[[x1,y1]];
      for(let i=1;i<15;i++){const ts=i/15,px=x1+(x2-x1)*ts,py=y1+(y2-y1)*ts,perp=Math.sin(ts*Math.PI);pts.push([px+(Math.random()-.5)*20*perp,py+(Math.random()-.5)*20*perp]);}
      pts.push([x2,y2]);taperPath(pts,wf+6,wt+6,'#ffff80',50);taperPath(pts,wf,wt,'#ffffc8',230);break;}
    case 'water_flow':{
      const pts=[[x1,y1]],dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1;
      for(let i=1;i<=20;i++){const ts=i/20,w2=Math.sin(ts*Math.PI*4+t)*8;pts.push([x1+dx*ts-dy/len*w2,y1+dy*ts+dx/len*w2]);}
      pts.push([x2,y2]);taperPath(pts,wf,wt,'#64c8ff',200);
      for(let i=0;i<3;i++){const st=((i/3)+t/10)%1,sx=x1+(x2-x1)*st,sy=y1+(y2-y1)*st,r2=Math.max(1.5,(wf+(wt-wf)*st)*.7);
        ctx.beginPath();ctx.arc(sx,sy,r2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.6)';ctx.fill();}break;}
    case 'fire':{
      const pts=[[x1,y1]],dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1;
      for(let i=1;i<=18;i++){const ts=i/18,fl=Math.sin(ts*8+t*3)*6+Math.random()*3;pts.push([x1+dx*ts-dy/len*fl,y1+dy*ts+dx/len*fl]);}
      pts.push([x2,y2]);taperPath(pts,wf+4,wt+4,'#ff6400',140);taperPath(pts,wf,wt,'#ffc800',210);taperPath(pts,wf*.5,wt*.5,'#ffff96',230);break;}
    case 'crystalline':{
      const pts=[[x1,y1]],dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1;
      for(let i=1;i<6;i++){const ts=i/6,off=(Math.random()-.5)*15;pts.push([x1+dx*ts-dy/len*off,y1+dy*ts+dx/len*off]);}
      pts.push([x2,y2]);taperPath(pts,wf+5,wt+5,'#c8f0ff',65);taperPath(pts,wf,wt,'#96dcff',220);taperPath(pts,wf*.4,wt*.4,'#ffffff',230);break;}
    case 'particle_stream':{
      const pts=bezPts(x1,y1,x2,y2);taperPath(pts,wf*.5,wt*.5,fn.color,90);
      for(let i=0;i<6;i++){const pt=((i/6)+t/5)%1,px=x1+(x2-x1)*pt,py=y1+(y2-y1)*pt;
        const wa=wf+(wt-wf)*pt,sz=Math.max(1.5,wa*.9+Math.sin(pt*Math.PI)*wa*.5),al=Math.sin(pt*Math.PI);
        const gd=ctx.createRadialGradient(px,py,0,px,py,sz*2);
        gd.addColorStop(0,rgba(fn.color,al));gd.addColorStop(1,rgba(fn.color,0));
        ctx.fillStyle=gd;ctx.beginPath();ctx.arc(px,py,sz*2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=`rgba(255,255,255,${al})`;ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);ctx.fill();}break;}
    default:{taperPath(bezPts(x1,y1,x2,y2),wf,wt,fn.color,200);break;}
  }
}

// ── OPT-4: Text cache ────────────────────────────────────
// TEXT_CACHE declared above near normaliseNodes
function getTextLines(n){
  const r=n.size/2,fs=n.font_size||Math.max(8,Math.min(13,r*.22)),fb=n.font_bold!==false,ff=n.font_family||'Syne';
  const key=`${n.id}|${n.text}|${n.size}|${fs}|${fb}`;
  if(TEXT_CACHE[key])return TEXT_CACHE[key];
  const font=`${fb?700:400} ${fs}px '${ff}',sans-serif`;
  ctx.font=font;
  const mw=r*1.6,lh=fs+3,words=n.text.split(/\s+/),lines=[];let cur='';
  for(const w of words){const test=cur?cur+' '+w:w;ctx.measureText(test).width>mw&&cur?(lines.push(cur),cur=w):(cur=test);}
  if(cur)lines.push(cur);
  const disp=lines.slice(0,3);
  return TEXT_CACHE[key]={font,disp,lh,th:disp.length*lh,fc:n.font_color||'#ffffff'};
}

/* ─── Node painter ──────────────────────────────── */
function drawNode(n,pulse,isSel,isHov,flashAlpha){
  const{x,y,size,color,shape,intensity}=n,r=size/2;
  drawGlow(x,y,r,color,intensity,pulse);
  if(flashAlpha>0){ctx.save();ctx.globalAlpha=flashAlpha;ctx.strokeStyle=color;ctx.lineWidth=4*(1+flashAlpha);shapePath(ctx,x,y,r*1.3,shape);ctx.stroke();ctx.restore();}
  // OPT: no shadowBlur (expensive) — double stroke instead
  if(isSel){ctx.strokeStyle=rgba(color,.4);ctx.lineWidth=8;shapePath(ctx,x,y,r*1.2,shape);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=2.5;shapePath(ctx,x,y,r*1.18,shape);ctx.stroke();}
  if(isHov&&!isSel){ctx.strokeStyle=rgba(color,.5);ctx.lineWidth=2;shapePath(ctx,x,y,r*1.12,shape);ctx.stroke();}
  const img=IMG_CACHE[n.id];
  if(img){
    ctx.save();shapePath(ctx,x,y,r*(isSel?1.07:1),shape);ctx.clip();
    const s=Math.max(r*2/img.width,r*2/img.height);ctx.drawImage(img,x-img.width*s/2,y-img.height*s/2,img.width*s,img.height*s);
    ctx.fillStyle='rgba(0,0,0,.28)';shapePath(ctx,x,y,r,shape);ctx.fill();ctx.restore();
    if(isSel){ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=3;shapePath(ctx,x,y,r*1.07,shape);ctx.stroke();}
  } else {
    ctx.fillStyle=intensity>=4?lighten(color,18):color;shapePath(ctx,x,y,r*(isSel?1.07:1),shape);ctx.fill();
    if(n.image_data&&!LOADING[n.id])loadImage(n);
  }
  if(n.text){const{font,disp,lh,th,fc}=getTextLines(n);ctx.font=font;ctx.fillStyle=fc;ctx.textAlign='center';ctx.textBaseline='middle';disp.forEach((l,i)=>ctx.fillText(l,x,y-th/2+i*lh+lh/2));}
  const bs=Math.max(13,Math.min(26,r*.24)),off=r/2.5;
  ctx.textAlign='center';ctx.textBaseline='middle';
  if(n.task_list?.length){const done=n.task_list.filter(t=>t.done).length,tot=n.task_list.length;ctx.beginPath();ctx.arc(x+off,y+off,bs/2,0,Math.PI*2);ctx.fillStyle=done===tot?'#10b981':done?'#f59e0b':'#3b82f6';ctx.fill();ctx.fillStyle='#fff';ctx.font=`700 ${Math.max(7,bs*.5)}px 'DM Mono'`;ctx.fillText(done===tot?'✓':`${done}/${tot}`,x+off,y+off);}
  if(n.date_pins?.length){ctx.beginPath();ctx.arc(x-off,y+off,bs/2,0,Math.PI*2);ctx.fillStyle='#8b5cf6';ctx.fill();ctx.fillStyle='#fff';ctx.font=`700 ${Math.max(7,bs*.5)}px Syne`;ctx.fillText('📌',x-off,y+off);}
  if(n.journal_entry?.trim()){ctx.beginPath();ctx.arc(x-off,y-off,bs/2,0,Math.PI*2);ctx.fillStyle='#ec4899';ctx.fill();ctx.fillStyle='#fff';ctx.font=`700 ${Math.max(7,bs*.5)}px Syne`;ctx.fillText('📖',x-off,y-off);}
  if(n.attached_files?.length){ctx.beginPath();ctx.arc(x+off,y-off,bs/2,0,Math.PI*2);ctx.fillStyle='#f59e0b';ctx.fill();ctx.fillStyle='#fff';ctx.font=`700 ${Math.max(7,bs*.5)}px Syne`;ctx.fillText(n.attached_files.length>1?`📎${n.attached_files.length}`:'📎',x+off,y-off);}
  if(n.image_data&&!img){ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,r*.4,0,Math.PI*2);ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.8)';ctx.beginPath();ctx.arc(x,y,r*.4,-Math.PI/2,-Math.PI/2+animT*3);ctx.stroke();}
}

// ── OPT-7: Minimap dirty flag ─────────────────────────────
// minimapDirty declared above near normaliseNodes
let mmPX=null,mmPY=null,mmZ=null;
function drawMinimap(){
  if(!minimapDirty&&Math.abs(panX-mmPX)<0.5&&Math.abs(panY-mmPY)<0.5&&Math.abs(zoom-mmZ)<0.002)return;
  const mw=mc.width,mh=mc.height;
  mctx.clearRect(0,0,mw,mh);mctx.fillStyle='rgba(3,7,18,.88)';mctx.fillRect(0,0,mw,mh);
  let mnx=1e9,mxx=-1e9,mny=1e9,mxy=-1e9;
  MAP_DATA.nodes.forEach(n=>{mnx=Math.min(mnx,n.x-n.size/2);mxx=Math.max(mxx,n.x+n.size/2);mny=Math.min(mny,n.y-n.size/2);mxy=Math.max(mxy,n.y+n.size/2);});
  const pad=8,pw=mxx-mnx||1,ph=mxy-mny||1,scale=Math.min((mw-pad*2)/pw,(mh-pad*2)/ph);
  const ox=pad-mnx*scale+(mw-pw*scale)/2,oy=pad-mny*scale+(mh-ph*scale)/2;
  // batch all connection lines in one path
  mctx.strokeStyle='rgba(71,85,105,.5)';mctx.lineWidth=.8;mctx.beginPath();
  MAP_DATA.connections.forEach(([fi,ti])=>{const fn=NM[fi],tn=NM[ti];if(!fn||!tn)return;mctx.moveTo(fn.x*scale+ox,fn.y*scale+oy);mctx.lineTo(tn.x*scale+ox,tn.y*scale+oy);});
  mctx.stroke();
  MAP_DATA.nodes.forEach(n=>{const nx=n.x*scale+ox,ny=n.y*scale+oy,nr=Math.max(2,n.size*scale/2);mctx.beginPath();mctx.arc(nx,ny,nr,0,Math.PI*2);mctx.fillStyle=n.color+'cc';mctx.fill();});
  const cw=canvas.width,ch=canvas.height,vlx=(-panX-cw/2)/zoom,vly=(-panY-ch/2)/zoom;
  const vsx=vlx*scale+ox,vsy=vly*scale+oy,vex=(vlx+cw/zoom)*scale+ox,vey=(vly+ch/zoom)*scale+oy;
  mctx.strokeStyle='rgba(124,58,237,.75)';mctx.lineWidth=1.5;mctx.strokeRect(vsx,vsy,vex-vsx,vey-vsy);
  mctx.fillStyle='rgba(124,58,237,.08)';mctx.fillRect(vsx,vsy,vex-vsx,vey-vsy);
  minimapDirty=false;mmPX=panX;mmPY=panY;mmZ=zoom;
}

/* ─── Flash ─────────────────────────────────────── */
const flashState={};
function flashNode(nodeId){flashState[nodeId]={start:animT,dur:1.5};}
function getFlashAlpha(nodeId){
  const fs=flashState[nodeId];if(!fs)return 0;
  const t=(animT-fs.start)/fs.dur;if(t>=1){delete flashState[nodeId];return 0;}
  return(1-t)*(1-t);
}

// ── OPT-9: idle mode (20fps when nothing animating) ───────
function scheduleRender(){if(!rafId)rafId=requestAnimationFrame(frame);}
const ANIM_STYLES=new Set(['neon_glow','energy_pulse','water_flow','fire','electric','particle_stream','crystalline']);
function isAnimating(){
  if(drag||Object.keys(flashState).length)return true;
  if(Math.abs(vx)>.05||Math.abs(vy)>.05)return true;
  if(Math.abs(tpX-panX)>.1||Math.abs(tpY-panY)>.1||Math.abs(tZ-zoom)>.001)return true;
  if(COLLAB.users.some(u=>u.visible))return true;
  return MAP_DATA.connections.some(([fi,ti])=>ANIM_STYLES.has(MAP_DATA.connection_styles[`${fi}-${ti}`]||''));
}

/* ─── Render loop ──────────────────────────────── */
let lastZL=-1;
function render(ts){
  rafId=null;animT=ts*.001;
  // OPT-8: skip lerp when at target
  const dx=Math.abs(tpX-panX),dy=Math.abs(tpY-panY),dz=Math.abs(tZ-zoom);
  panX=dx>.05?lerp(panX,tpX,.14):tpX;
  panY=dy>.05?lerp(panY,tpY,.14):tpY;
  zoom=dz>.001?lerp(zoom,tZ,.14):tZ;
  if(!drag){tpX+=vx;tpY+=vy;vx*=.88;vy*=.88;}
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.translate(panX+W/2,panY+H/2);ctx.scale(zoom,zoom);
  const pulse=Math.sin(animT*1.5)*.5+.5;
  MAP_DATA.connections.forEach(([fi,ti])=>{const fn=NM[fi],tn=NM[ti];if(!fn||!tn)return;drawConn(fn.x,fn.y,tn.x,tn.y,fn,tn,MAP_DATA.connection_styles[`${fi}-${ti}`]||'curved',animT);});
  MAP_DATA.nodes.forEach(n=>drawNode(n,pulse,n===selNode,n===hovNode,getFlashAlpha(n.id)));
  COLLAB.users.forEach(u=>{
    if(!u.visible)return;
    ctx.fillStyle=u.color;ctx.beginPath();ctx.moveTo(u.sx,u.sy);ctx.lineTo(u.sx+10,u.sy+8);ctx.lineTo(u.sx+4,u.sy+9);ctx.lineTo(u.sx+7,u.sy+15);ctx.lineTo(u.sx+4,u.sy+16);ctx.lineTo(u.sx+1,u.sy+10);ctx.lineTo(u.sx-3,u.sy+13);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=.5/zoom;ctx.stroke();
  });
  ctx.restore();
  COLLAB.updateCursorDOM();drawMinimap();
  // OPT-10: avoid DOM write when label unchanged
  const zl=Math.round(zoom*100);if(zl!==lastZL){DOM.zlabel.textContent=zl+'%';lastZL=zl;}
  // OPT-9: drop to 20fps when idle
  if(isAnimating()){rafId=requestAnimationFrame(frame);}
  else{setTimeout(()=>{rafId=requestAnimationFrame(frame);},48);}
}
let _t0=null;
function frame(ts){
  if(!_t0)_t0=ts;
  COLLAB.update(ts-_t0);
  render(ts);
}

/* ─── Hit test (OPT-12: iterate backwards, no array copy) ── */
function hitTest(mx,my){
  const{x:sx,y:sy}=toScene(mx,my);
  for(let i=MAP_DATA.nodes.length-1;i>=0;i--){const n=MAP_DATA.nodes[i],r=n.size/2+4,dx=sx-n.x,dy=sy-n.y;if(dx*dx+dy*dy<=r*r)return n;}
  return null;
}

/* ─── Interaction ─────────────────────────────── */
wrap.addEventListener('mousedown',e=>{if(e.button!==0)return;drag=true;vx=0;vy=0;lmx=e.clientX;lmy=e.clientY;wrap.classList.add('grabbing');});
wrap.addEventListener('mousemove',e=>{
  const mx=e.clientX,my=e.clientY-54;
  if(drag){const dx=mx-lmx,dy=e.clientY-lmy;vx=dx*.5;vy=dy*.5;tpX+=dx;tpY+=dy;lmx=mx;lmy=e.clientY;}
  const hit=hitTest(mx,my);
  if(hit!==hovNode){
    hovNode=hit;
    if(hit){
      const sc=toScreen(hit.x,hit.y);
      const subs=[];
      if(hit.task_list?.length)     subs.push(`📋 ${hit.task_list.filter(t=>t.done).length}/${hit.task_list.length}`);
      if(hit.date_pins?.length)     subs.push(`📌 ${hit.date_pins.length}`);
      if(hit.journal_entry?.trim()) subs.push('📖 journal');
      if(hit.attached_files?.length)subs.push(`📎 ${hit.attached_files.length} file${hit.attached_files.length>1?'s':''}`);
      if(hit.image_data)            subs.push('🖼 image');
      DOM.ttText.textContent=hit.text;
      DOM.ttSub.textContent=subs.join(' · ');
      DOM.tooltip.style.left=(sc.x+18)+'px';DOM.tooltip.style.top=(sc.y+54+18)+'px';
      DOM.tooltip.classList.add('vis');wrap.style.cursor='pointer';
    } else {DOM.tooltip.classList.remove('vis');wrap.style.cursor=drag?'grabbing':'grab';}
  }
});
wrap.addEventListener('mouseup',e=>{
  if(!drag)return;drag=false;wrap.classList.remove('grabbing');
  const mx=e.clientX,my=e.clientY-54;
  const moved=Math.abs(e.clientX-lmx)+Math.abs(e.clientY-lmy);
  if(moved<5){const hit=hitTest(mx,my);if(hit){selNode=hit;openPanel(hit);}else{selNode=null;closePanel();}}
});
wrap.addEventListener('mouseleave',()=>{drag=false;wrap.classList.remove('grabbing');document.getElementById('tooltip').classList.remove('vis');});
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:.92,mx=e.clientX,my=e.clientY-54;
  const sx=(mx-tpX-canvas.width/2)/tZ,sy=(my-tpY-canvas.height/2)/tZ;
  const nz=Math.max(.1,Math.min(4,tZ*f));
  tpX-=sx*(nz-tZ);tpY-=sy*(nz-tZ);tZ=nz;
},{passive:false});
function zoomIn(){const nz=Math.min(4,tZ*1.2);tpX*=nz/tZ;tpY*=nz/tZ;tZ=nz;}
function zoomOut(){const nz=Math.max(.1,tZ*.85);tpX*=nz/tZ;tpY*=nz/tZ;tZ=nz;}
function resetView(){tpX=0;tpY=0;tZ=1;}

/* ─── Minimap interaction ────────────────────── */
// Converts a minimap pixel position into a scene position and pans there.
// Recomputes the same scale/origin as drawMinimap so the math always matches.
function mmScenePos(mmX, mmY){
  const mw=mc.width, mh=mc.height;
  let mnx=1e9,mxx=-1e9,mny=1e9,mxy=-1e9;
  MAP_DATA.nodes.forEach(n=>{mnx=Math.min(mnx,n.x-n.size/2);mxx=Math.max(mxx,n.x+n.size/2);mny=Math.min(mny,n.y-n.size/2);mxy=Math.max(mxy,n.y+n.size/2);});
  const pad=8,pw=mxx-mnx||1,ph=mxy-mny||1,scale=Math.min((mw-pad*2)/pw,(mh-pad*2)/ph);
  const ox=pad-mnx*scale+(mw-pw*scale)/2, oy=pad-mny*scale+(mh-ph*scale)/2;
  return{x:(mmX-ox)/scale, y:(mmY-oy)/scale};
}

let mmDrag=false;
const mmWrap=document.getElementById('minimap-wrap');
mmWrap.style.cursor='crosshair';

function mmPanTo(e){
  const rect=mc.getBoundingClientRect();
  const mmX=e.clientX-rect.left, mmY=e.clientY-rect.top;
  const{x:sx,y:sy}=mmScenePos(mmX,mmY);
  tpX=-sx*tZ; tpY=-sy*tZ;
  scheduleRender();
}
mmWrap.addEventListener('mousedown',e=>{e.stopPropagation();mmDrag=true;mmPanTo(e);});
mmWrap.addEventListener('mousemove',e=>{if(mmDrag)mmPanTo(e);});
mmWrap.addEventListener('mouseup', e=>{mmDrag=false;});
mmWrap.addEventListener('mouseleave',()=>{mmDrag=false;});

/* ─── File type helpers ────────────────────────── */
const FILE_ICONS={pdf:'📄',image:'🖼',figma:'🎨',markdown:'📝',doc:'📝',docx:'📝',xlsx:'📊',zip:'🗜',default:'📎'};
const FILE_COLORS={pdf:'#ef4444',image:'#3b82f6',figma:'#a855f7',markdown:'#10b981',default:'#f59e0b'};
function fileIcon(type){return FILE_ICONS[type]||FILE_ICONS.default;}
function fileColor(type){return FILE_COLORS[type]||FILE_COLORS.default;}
function fmtSize(bytes){if(bytes<1024)return bytes+'B';if(bytes<1048576)return(bytes/1024).toFixed(0)+'KB';return(bytes/1048576).toFixed(1)+'MB';}

/* ─── Detail Panel ────────────────────────────── */
function openPanel(node){
  const body=document.getElementById('panel-body');
  body.innerHTML='';
  const mk=(tag,cls,txt)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;};
  const add=(el)=>body.appendChild(el);

  // Color strip
  const strip=mk('div','color-strip');strip.style.background=node.color;strip.style.boxShadow=`0 0 10px ${node.color}`;add(strip);

  // Image preview in panel
  if(node.image_data){
    const wrap=mk('div','node-image-preview');
    const img=document.createElement('img');img.src=node.image_data;img.alt=node.text;
    wrap.appendChild(img);add(wrap);
  }

  add(mk('div','node-big-text',node.text));

  // Meta tags
  const meta=mk('div','node-meta');
  [{k:'⬡',v:node.shape},{k:'✦',v:`intensity ${node.intensity}`},{k:'⊕',v:`size ${node.size}`}].forEach(({k,v})=>{const s=mk('span','tag',`${k} ${v}`);meta.appendChild(s);});
  if(node.mood){const m=mk('span','tag',node.mood);meta.appendChild(m);}
  if(node.is_ai_generated){const ai=mk('span','tag','🤖 AI');meta.appendChild(ai);}
  add(meta);

  // Mood badge
  if(node.mood){
    const mb=mk('div','mood-badge',node.mood);
    mb.style.background='rgba(139,92,246,.15)';mb.style.border='1px solid rgba(139,92,246,.3)';mb.style.color='#a78bfa';
    add(mb);
  }

  // Journal
  if(node.journal_entry&&node.journal_entry.trim()){
    add(mk('div','sec-lbl','📖 Journal Entry'));
    const wrap=mk('div','journal-wrap');
    const content=mk('div','journal-content');
    // Allow safe HTML (journal may contain <p>, <strong> from AI gen)
    content.innerHTML=node.journal_entry;
    wrap.appendChild(content);add(wrap);
  }

  // Tasks
  if(node.task_list&&node.task_list.length){
    const done=node.task_list.filter(t=>t.done).length,tot=node.task_list.length;
    add(mk('div','sec-lbl',`📋 Tasks — ${done}/${tot} complete`));
    const prog=mk('div','task-progress');const fill=mk('div','task-progress-fill');
    fill.style.width=`${(done/tot*100).toFixed(0)}%`;prog.appendChild(fill);add(prog);
    node.task_list.forEach(t=>{
      const row=mk('div','task-row');
      const chk=mk('div','task-check'+(t.done?' done':''));if(t.done)chk.textContent='✓';
      const txt=mk('div','task-txt'+(t.done?' done':''),t.text);
      row.appendChild(chk);row.appendChild(txt);add(row);
    });
  }

  // Files
  if(node.attached_files&&node.attached_files.length){
    add(mk('div','sec-lbl',`📎 Files (${node.attached_files.length})`));
    node.attached_files.forEach(f=>{
      const row=mk('div','file-row');
      row.title='File attached in ThoughtJunkie';
      const icon=mk('div','file-icon',fileIcon(f.type));
      const info=mk('div','file-info');
      const name=mk('div','file-name',f.name);
      const size=mk('div','file-size',fmtSize(f.size_bytes));
      info.appendChild(name);info.appendChild(size);
      const badge=mk('span','file-badge',f.type.toUpperCase());
      badge.style.borderColor=fileColor(f.type)+'44';badge.style.color=fileColor(f.type);badge.style.background=fileColor(f.type)+'18';
      row.appendChild(icon);row.appendChild(info);row.appendChild(badge);
      add(row);
    });
    const note=mk('div','',`Files are available to collaborators with edit access.`);
    note.style.cssText='font-size:10px;color:var(--text-dim);font-family:var(--font-mono);margin-top:4px;';
    add(note);
  }

  // Date pins
  if(node.date_pins&&node.date_pins.length){
    add(mk('div','sec-lbl','📌 Date Pins'));
    node.date_pins.forEach(d=>{
      const row=mk('div','pin-row','📌 '+d);add(row);
    });
  }

  document.getElementById('detail-panel').classList.add('open');
  tpX=-node.x*tZ;tpY=-node.y*tZ;
}
function closePanel(){document.getElementById('detail-panel').classList.remove('open');selNode=null;}

/* ══════════════════════════════════════════════════════════
   LIVE POLLING — checks for updates from ThoughtJunkie

   When the desktop app publishes/saves, it PUTs updated JSON
   to POST /api/v1/maps/{id}/update
   This viewer polls GET /api/v1/maps/{id} every 30s and
   applies a smooth diff if updated_at changed.

   To wire up with real backend:
     1. Replace POLL_URL with your actual API endpoint
     2. Remove the demo simulation block below
══════════════════════════════════════════════════════════ */
const POLL_URL = `/api/v1/maps/${MAP_ID}`;  // ← point at your backend
let lastUpdatedAt = MAP_DATA.meta.updated_at;
let pollInterval  = null;

async function pollForUpdates(){
  try {
    // In production: const res = await fetch(POLL_URL);
    // For now we simulate a map update after a delay (demo only)
    return; // remove this line when backend exists
  } catch(e){ /* network error — silent, will retry */ }
}

function applyMapUpdate(newData){
  const oldNodes = new Map(MAP_DATA.nodes.map(n=>[n.id,n]));
  MAP_DATA = newData;
  normaliseNodes();

  // Flash nodes that changed or are new
  MAP_DATA.nodes.forEach(n=>{
    const old=oldNodes.get(n.id);
    if(!old || old.text!==n.text || old.x!==n.x || old.y!==n.y ||
       old.color!==n.color || (old.task_list?.length)!==(n.task_list?.length)){
      flashNode(n.id);
    }
  });

  lastUpdatedAt=newData.meta.updated_at;
  showUpdateBanner(`Updated from ThoughtJunkie`, new Date(newData.meta.updated_at));
  if(selNode) openPanel(NM[selNode.id]||selNode); // refresh panel
}

function showUpdateBanner(msg, date){
  const banner=document.getElementById('update-banner');
  document.getElementById('update-msg').textContent='🔄 '+msg;
  if(date) document.getElementById('update-time').textContent=
    date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  banner.classList.add('show');
  setTimeout(()=>banner.classList.remove('show'), 5000);
}

function startPolling(intervalMs=30000){
  if(pollInterval) clearInterval(pollInterval);
  pollInterval=setInterval(pollForUpdates, intervalMs);
}

/* ─── Collab ─────────────────────────────────── */
const COLLAB={
  users:[
    {id:'kira',name:'Kira M.',color:'#3b82f6',abbr:'KM',sx:0,sy:0,visible:false,phase:0,speed:.6,tgt:2,action:'Viewing',tick:0},
    {id:'theo',name:'Theo P.',color:'#10b981',abbr:'TP',sx:0,sy:0,visible:false,phase:2.1,speed:.4,tgt:5,action:'Editing',tick:0},
  ],
  msgs:[u=>`${u.name} is viewing "${NM[u.tgt]?.text||'a node'}"`,u=>`${u.name} added a comment`,u=>`${u.name} zoomed in`,u=>`${u.name} forked this map`],
  ticker:0,
  update(elapsed){
    this.users.forEach((u,i)=>{
      u.phase+=.008+u.speed*.004;
      const tgt=NM[u.tgt];if(!tgt)return;
      const w=tgt.size*.85;
      u.sx=tgt.x+Math.sin(u.phase)*w*(1+.3*Math.sin(u.phase*2));
      u.sy=tgt.y+Math.cos(u.phase)*w*.5+Math.sin(u.phase*2)*18;
      u.tick++;if(u.tick>320){u.tick=0;const ids=MAP_DATA.nodes.map(n=>n.id);u.tgt=ids[Math.floor(Math.random()*ids.length)];u.action=Math.random()>.5?'Editing':'Viewing';}
      if(elapsed>3000+i*2000)u.visible=true;
    });
    this.ticker+=16;
    if(this.ticker>5000){this.ticker=0;const u=this.users[Math.floor(Math.random()*this.users.length)];const msg=this.msgs[Math.floor(Math.random()*this.msgs.length)](u);const el=document.getElementById('collab-ticker');el.textContent=msg;setTimeout(()=>el.textContent='',4500);}
  },
  updateCursorDOM(){
    // OPT-11: cache elements, skip DOM writes when position barely changed
    if(!DOM.cur0) DOM.cur0=document.getElementById('cur0');
    if(!DOM.cur1) DOM.cur1=document.getElementById('cur1');
    const els=[DOM.cur0,DOM.cur1];
    this.users.forEach((u,i)=>{
      const el=els[i];if(!el)return;
      if(!u.visible){if(el.style.display!=='none')el.style.display='none';return;}
      const sc=toScreen(u.sx,u.sy);
      const lx=Math.round(sc.x),ly=Math.round(sc.y+54);
      if(el._lx===lx&&el._ly===ly&&el.style.display==='block')return;
      el._lx=lx;el._ly=ly;
      el.style.left=lx+'px';el.style.top=ly+'px';
      el.style.background=u.color;el.style.color='#fff';el.textContent=u.name;el.style.display='block';
    });
  },
  buildUI(){
    const stack=document.getElementById('avatar-stack'),usersDiv=document.getElementById('collab-users');
    stack.innerHTML='';usersDiv.innerHTML='';
    const me=document.createElement('div');me.className='avatar';me.style.background='#8b5cf6';me.textContent='Me';
    const mt=document.createElement('div');mt.className='avatar-tip';mt.textContent='You (owner)';me.appendChild(mt);stack.appendChild(me);
    this.users.forEach(u=>{
      const av=document.createElement('div');av.className='avatar';av.style.background=u.color;av.textContent=u.abbr;
      const tip=document.createElement('div');tip.className='avatar-tip';tip.textContent=u.name;av.appendChild(tip);stack.appendChild(av);
      const row=document.createElement('div');row.className='cu-row';
      const dot=document.createElement('div');dot.className='cu-dot';dot.style.background=u.color;
      const name=document.createElement('div');name.className='cu-name';name.textContent=u.name;
      const act=document.createElement('div');act.className='cu-act';act.textContent=u.action;
      row.appendChild(dot);row.appendChild(name);row.appendChild(act);usersDiv.appendChild(row);
    });
  }
};
