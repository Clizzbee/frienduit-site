let _ac = null;
const getAC = () => { if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)(); return _ac; };
const tone = (f, type, dur, vol, d) => {
  try {
    const c = getAC(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type || "triangle"; o.frequency.value = f;
    const t = c.currentTime + (d || 0);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol || 0.25, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + (dur || 0.12));
    o.start(t); o.stop(t + (dur || 0.12) + 0.06);
  } catch (e) {}
};
const sfx = {
  slice:  () => { tone(820,"sawtooth",0.055,0.3); tone(1300,"sine",0.09,0.18,0.04); },
  wrong:  () => { tone(180,"sawtooth",0.22,0.4); tone(120,"square",0.18,0.3,0.07); },
  combo:  (tier) => { [523,659,784,988,1175,1568].slice(0,Math.min(tier+2,6)).forEach((f,i)=>tone(f,"triangle",0.13,0.28,i*0.07)); },
  ninja:  () => { for(let i=0;i<7;i++) tone(280+i*100,"sine",0.16,0.22,i*0.055); },
  clear:  () => { [523,659,784,1047,1319].forEach((f,i)=>tone(f,"triangle",0.18,0.32,i*0.09)); },
  launch: () => { [220,330,440,660,880].forEach((f,i)=>tone(f,"triangle",0.22,0.28,i*0.06)); },
};

/* ═══════════════════════════════════════════════════════════════════════
   ANNOUNCER
   Tries Google Translate TTS (sounds human) then StreamElements (Polly/Brian)
   then Web Speech as last resort. Shows a debug badge so you can see which fires.
═══════════════════════════════════════════════════════════════════════ */

const HYPE_INTROS = [
  "Alright!", "Let's go!", "Here we go!", "Next up!", "Challenge time!",
  "Get ready!", "Listen up!", "Oh yeah!", "Come on!", "Here it is!",
  "Lock in!", "Stay sharp!", "Go go go!", "You got this!", "Heads up!",
];

let _ann = { audio: null, timer: null, engine: "none" };

// Show a tiny HUD badge so we can see which engine fired
const _showBadge = (label) => {
  let el = document.getElementById("_tts_badge");
  if(!el){ el=document.createElement("div"); el.id="_tts_badge"; Object.assign(el.style,{position:"fixed",bottom:"8px",right:"8px",zIndex:99999,fontSize:"9px",letterSpacing:"2px",padding:"3px 8px",borderRadius:"4px",fontFamily:"monospace",pointerEvents:"none",transition:"opacity 0.5s"}); document.body.appendChild(el); }
  el.textContent = "TTS: " + label;
  el.style.background = label==="GOOGLE"?"#004400":label==="POLLY"?"#003366":label==="WEB"?"#440000":"#222";
  el.style.color = label==="GOOGLE"?"#00ff88":label==="POLLY"?"#00aaff":label==="WEB"?"#ff8888":"#666";
  el.style.opacity = "1";
  clearTimeout(_ann._badgeTimer);
  _ann._badgeTimer = setTimeout(()=>{ el.style.opacity="0"; }, 4000);
};

const cancelSpeech = () => {
  clearTimeout(_ann.timer);
  if(_ann.audio){ try{ _ann.audio.pause(); _ann.audio.src=""; }catch(e){} _ann.audio=null; }
  if(window.speechSynthesis) window.speechSynthesis.cancel();
};

// Attempt 1: Google Translate TTS — sounds like a real person, no API key
const _tryGoogle = (text, onDone, onFail) => {
  const url = "https://translate.google.com/translate_tts?ie=UTF-8&tl=en-US&client=tw-ob&q=" + encodeURIComponent(text);
  const audio = new Audio();
  audio.crossOrigin = "anonymous";
  _ann.audio = audio;
  let fired = false;
  const fail = () => { if(fired) return; fired=true; _ann.audio=null; onFail(); };
  audio.oncanplaythrough = () => {
    if(fired) return; fired=true;
    _showBadge("GOOGLE");
    audio.play().then(()=>{
      audio.onended = ()=>{ _ann.audio=null; onDone(); };
    }).catch(fail);
  };
  audio.onerror = fail;
  setTimeout(()=>{ if(!fired) fail(); }, 3000); // timeout
  audio.src = url;
  audio.load();
};

// Attempt 2: StreamElements (Amazon Polly Brian) via fetch -> AudioContext
const _tryPolly = async (text, onDone, onFail) => {
  try {
    const url = "https://api.streamelements.com/kappa/v2/speech?voice=Brian&text=" + encodeURIComponent(text);
    const res = await fetch(url, {mode:"cors"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const buf = await res.arrayBuffer();
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    await ac.resume();
    const decoded = await ac.decodeAudioData(buf);
    const src = ac.createBufferSource();
    src.buffer = decoded;
    src.connect(ac.destination);
    src.onended = ()=>{ ac.close(); onDone(); };
    _showBadge("POLLY");
    src.start(0);
  } catch(e) {
    onFail();
  }
};

// Attempt 3: Web Speech — robotic but always works
const _tryWebSpeech = (text, rate, pitch, onDone) => {
  if(!window.speechSynthesis){ if(onDone)onDone(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate=rate; utt.pitch=pitch; utt.volume=1.0;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v=>/google us english/i.test(v.name))
         || voices.find(v=>/google uk english male/i.test(v.name))
         || voices.find(v=>/daniel|david|mark|alex/i.test(v.name))
         || voices.find(v=>v.lang.startsWith("en")&&!v.localService)
         || voices.find(v=>v.lang.startsWith("en"));
  if(v) utt.voice=v;
  utt.onend=()=>{ if(onDone)onDone(); };
  _showBadge("WEB");
  window.speechSynthesis.speak(utt);
};

const toSpeech = (label) => label
  .replace(/[-–—]/g, " to ")
  .replace(/[!]/g, "")
  .replace(/\s+/g, " ")
  .trim();

// Chain: speak intro then challenge, trying engines in order
const _speakOne = (text, rate, pitch, onDone) => {
  _tryGoogle(text, onDone, ()=>{
    _tryPolly(text, onDone, ()=>{
      _tryWebSpeech(text, rate, pitch, onDone);
    });
  });
};

const announce = (label, isFirst=false) => {
  cancelSpeech();
  _ann.timer = setTimeout(()=>{
    const intro = HYPE_INTROS[Math.floor(Math.random()*HYPE_INTROS.length)];
    const challenge = toSpeech(label);
    _speakOne(intro, 1.2, 1.2, ()=>{
      setTimeout(()=> _speakOne(challenge, 1.05, 1.1, ()=>{}), 100);
    });
  }, isFirst ? 600 : 150);
};

const isPrime = (n) => { if(n<2) return false; for(let i=2;i<=Math.sqrt(n);i++) if(n%i===0) return false; return true; };
const shuffle = (a) => { const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]; } return b; };
const pick    = (arr,n) => shuffle([...arr]).slice(0,n);
const rand    = (arr) => arr[Math.floor(Math.random()*arr.length)];
const hexToRgb = (hex) => {
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r?(parseInt(r[1],16)+","+parseInt(r[2],16)+","+parseInt(r[3],16)):"255,215,0";
};

═══════════════════════════════════════════════════════════════════════ */
const mkTile = (display,isCorrect,id,meta) => ({id,display:String(display),isCorrect,state:"idle",meta:meta||{}});
function makeColorTiles(tag) {
  const target=COLOR_POOL.find(c=>c.tag===tag), others=COLOR_POOL.filter(c=>c.tag!==tag);
  const correct=Array.from({length:6},(_,i)=>mkTile(target.icon+" "+target.v,true,i,{fg:target.fg,bg:target.bg,fs:13}));
  const wrong=[];
  for(let i=0;wrong.length<19;i++){const c=others[i%others.length];wrong.push(mkTile(c.icon+" "+c.v,false,6+i,{fg:c.fg,bg:c.bg,fs:13}));}
  return shuffle([...correct,...wrong]).slice(0,25).map((t,i)=>({...t,id:i}));
}
function makeLetterTiles(target) {
  const isVowels=target==="VOWELS", check=isVowels?l=>VOWELS_LIST.includes(l):l=>l===target;
  const correct=isVowels?[...VOWELS_LIST,...VOWELS_LIST]:Array.from({length:7},()=>target);
  const wrong=pick(ALL_LETTERS.filter(l=>!check(l)),18);
  return shuffle([...correct.map((l,i)=>mkTile(l,true,i,{fs:30})),...wrong.map((l,i)=>mkTile(l,false,i+correct.length,{fs:30}))]).slice(0,25).map((t,i)=>({...t,id:i}));
}
function makeWordTiles(correct,wrong) {
  const c=pick(correct,Math.min(7,correct.length)), filtered=wrong.filter(x=>!correct.includes(x)), w=pick(filtered,Math.min(18,filtered.length));
  const all=shuffle([...c.map((v,i)=>mkTile(v,true,i)),...w.map((v,i)=>mkTile(v,false,i+7))]).slice(0,25);
  if(!all.some(t=>t.isCorrect)&&correct.length>0) all[0]=mkTile(correct[0],true,0);
  return all.map((t,i)=>({...t,id:i}));
}
function makeNumTiles(check,min,max) {
  const nums=Array.from({length:max-min+1},(_,i)=>i+min);
  const valids=nums.filter(check), invalids=nums.filter(n=>!check(n));
  if(!valids.length) return makeNumTiles(n=>n%2===0,1,25);
  return shuffle([...pick(valids,Math.min(7,valids.length)).map((v,i)=>mkTile(v,true,i)),...pick(invalids,Math.min(18,invalids.length)).map((v,i)=>mkTile(v,false,i+7))]).slice(0,25).map((t,i)=>({...t,id:i}));
}

function StarField() {

    <div style={{position:"absolute",inset:0,overflow:"hidden",zIndex:0,pointerEvents:"none"}}>
      {STAR_DATA.map(s=>(
        <div key={s.id} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:s.size,height:s.size,borderRadius:"50%",background:"white",animation:"twinkle "+s.dur+"s "+s.delay+"s ease-in-out infinite"}}/>

/* ═══════════════════════════════════════════════════════════════════════
   PARTICLE
═══════════════════════════════════════════════════════════════════════ */
function Particle({p}) {
  const [gone,setGone]=useState(false);
  useEffect(()=>{const id=setTimeout(()=>setGone(true),30);return()=>clearTimeout(id);},[]);
  const tx=Math.cos(p.angle)*p.dist, ty=Math.sin(p.angle)*p.dist;
  const transform=gone
    ? "translate(calc(-50% + "+tx+"px), calc(-50% + "+ty+"px)) scale(0)"
    : "translate(-50%, -50%) scale(1)";
  return (
    <div style={{position:"absolute",left:p.ox,top:p.oy,width:p.size,height:p.size,borderRadius:"50%",background:p.color,transform,opacity:gone?0:1,transition:"transform 0.8s ease-out, opacity 0.8s ease-out",pointerEvents:"none"}}/>
  );
}
function ParticleLayer({particles}) {
  if(!particles.length) return null;
  return <div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:50,overflow:"hidden"}}>{particles.map(p=><Particle key={p.id} p={p}/>)}</div>;
}

/* ═══════════════════════════════════════════════════════════════════════
   TILE
═══════════════════════════════════════════════════════════════════════ */
function Tile({tile,ninjaMode,hintLevel,onClick}) {
  const {fg,bg:metaBg,fs:metaFs}=tile.meta;
  const len=tile.display.length;
  const fontSize=metaFs||(len===1?30:len<=3?18:len<=5?14:len<=7?11:9);
  const justSliced=tile.state==="correct";
  let boxShadow;
  if(justSliced) boxShadow="0 0 0 3px #ffd700, 0 0 30px rgba(255,215,0,0.7)";
  else if(ninjaMode) boxShadow="0 6px 24px rgba(0,0,0,0.6), 0 0 12px rgba(0,255,238,0.12)";
  else boxShadow="0 6px 24px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04)";
  const bg=metaBg||(ninjaMode?"linear-gradient(135deg,rgba(0,18,28,0.9),rgba(0,30,45,0.85))":"linear-gradient(135deg,rgba(18,8,35,0.9),rgba(25,12,50,0.85))");
  const border=justSliced?"2px solid #ffd700":ninjaMode?"1.5px solid rgba(0,255,238,0.4)":"1.5px solid rgba(180,120,255,0.18)";
  const color=fg||(ninjaMode?"#b8fff8":"#e0d8f8");
  const floatDur=3+(tile.id*0.17)%2.2, floatDelay=(tile.id*0.23)%3.5, spawnDelay=tile.id*0.025;
  let anim;
  if(tile.state==="idle") anim="tileIn 0.35s "+spawnDelay+"s both, tileFloat "+floatDur+"s "+floatDelay+"s ease-in-out infinite";
  else if(tile.state==="correct") anim="tileSlash 0.42s ease-out forwards";
  else if(tile.state==="wrong") anim="tileWrong 0.5s ease-out forwards";
  else anim="none";
  return (
    <div onClick={tile.state==="idle"?onClick:undefined} style={{width:90,height:74,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:10,background:bg,border,backdropFilter:"blur(10px)",boxShadow,fontSize,fontWeight:700,color,fontFamily:'"Rajdhani",sans-serif',letterSpacing:len===1?0:1.5,userSelect:"none",cursor:tile.state==="idle"?"pointer":"default",transition:"border-color 0.3s, box-shadow 0.3s",animation:anim,opacity:tile.state==="cleared"?0:1,textShadow:justSliced?"0 0 12px #ffd700":"none",textAlign:"center",lineHeight:1.2}}>
      {tile.display}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════
   TILE PROGRESS BAR
═══════════════════════════════════════════════════════════════════════ */
function TileProgressBar({tiles, ninjaMode}) {
  const total   = tiles.filter(t => t.isCorrect).length;
  const cleared = tiles.filter(t => t.isCorrect && t.state === "cleared").length;
  const pct     = total > 0 ? (cleared / total) * 100 : 0;
  const remaining = total - cleared;

  return (
    <div style={{position:"absolute",top:56,left:"50%",transform:"translateX(-50%)",width:320,zIndex:30,pointerEvents:"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>

        <span style={{fontSize:9,fontWeight:700,letterSpacing:2,color:ninjaMode?"#00ffee":"#ffd700",fontFamily:'"Rajdhani",sans-serif'}}>
          {cleared} / {total}
          {remaining > 0 && <span style={{color:ninjaMode?"rgba(0,255,238,0.4)":"rgba(255,215,0,0.4)",fontSize:7,marginLeft:4}}>({remaining} left)</span>}
        </span>
      </div>
      <div style={{height:4,background:"rgba(255,255,255,0.07)",borderRadius:2,overflow:"hidden",border:"1px solid "+(ninjaMode?"rgba(0,255,238,0.15)":"rgba(255,255,255,0.07)")}}>
        <div style={{
          height:"100%",
          width:pct+"%",
          background:ninjaMode
            ? "linear-gradient(90deg,#00ffee,#0088ff)"
            : pct>=100
              ? "linear-gradient(90deg,#00ff88,#00ffee)"
              : "linear-gradient(90deg,#ffd700,#ff8800)",
          borderRadius:2,
          transition:"width 0.3s ease, background 0.4s",
          boxShadow:ninjaMode?"0 0 6px #00ffee":pct>=100?"0 0 8px #00ff88":"none",
        }}/>
      </div>
      {/* pip markers for each correct tile */}
      <div style={{display:"flex",justifyContent:"space-between",marginTop:4,paddingLeft:1,paddingRight:1}}>
        {Array.from({length:total},(_,i)=>(
          <div key={i} style={{
            width:4,height:4,borderRadius:"50%",
            background: i < cleared
              ? (ninjaMode?"#00ffee":"#ffd700")
              : "rgba(255,255,255,0.1)",
            transition:"background 0.25s",
            boxShadow: i < cleared ? (ninjaMode?"0 0 4px #00ffee":"0 0 4px rgba(255,215,0,0.6)") : "none",
          }}/>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════
   GAME COMPONENT
═══════════════════════════════════════════════════════════════════════ */
function BEDUNinjaGame({initialStageId,initialJourney,onGoLauncher,onMarkComplete}) {
  const [screen,   setScreen]   = useState("menu");
  const [journey,  setJourney]  = useState(initialJourney||false);
  const [stageId,  setStageId]  = useState(initialStageId||0);
  const [challIdx, setChallIdx] = useState(0);
  const [tiles,    setTiles]    = useState([]);
  const [combo,    setCombo]    = useState(0);
  const [maxCombo, setMaxCombo] = useState(0);
  const [score,    setScore]    = useState(0);
  const [momentum, setMomentum] = useState(0);
  const [ninja,    setNinja]    = useState(false);
  const [banner,   setBanner]   = useState(null);
  const [shake,    setShake]    = useState(false);
  const [parts,    setParts]    = useState([]);
  const [round,    setRound]    = useState(1);
  const [timeLeft, setTimeLeft] = useState(90);
  const [trans,    setTrans]    = useState(false);

  const pid=useRef(0), bannerT=useRef(null), timerR=useRef(null);
  const ninjaR=useRef(false), transR=useRef(false), stageR=useRef(0), challR=useRef(0);
  const arenaR=useRef(null), gridR=useRef(null);
  ninjaR.current=ninja; transR.current=trans; stageR.current=stageId; challR.current=challIdx;

  const stage=STAGES[stageId]||STAGES[0];
  const chall=stage.challenges[challIdx%stage.challenges.length];
  const noTimer=stage.time===0;
  const comboTier=getTier(combo);

  const flash=useCallback((text,color)=>{
    clearTimeout(bannerT.current);
    setBanner({text,color});
    bannerT.current=setTimeout(()=>setBanner(null),1400);
  },[]);

  const spawnParticles=(tileId,good)=>{
    const colors=good?["#ffd700","#ff9900","#ffffff","#00ffcc"]:["#ff4444","#ff2222","#cc0000"];
    const count=good?12:6;
    let ox="50%",oy="50%";
    if(gridR.current&&arenaR.current){
      const cells=gridR.current.children;
      if(cells[tileId]){
        const cr=arenaR.current.getBoundingClientRect(), tr=cells[tileId].getBoundingClientRect();
        ox=(tr.left-cr.left+tr.width/2)+"px"; oy=(tr.top-cr.top+tr.height/2)+"px";
      }
    }
    const ps=Array.from({length:count},(_,i)=>({id:pid.current++,ox,oy,angle:(i/count)*Math.PI*2+Math.random()*0.5,dist:50+Math.random()*70,color:colors[i%colors.length],size:4+Math.random()*4}));
    setParts(p=>[...p,...ps]);
    setTimeout(()=>{const ids=new Set(ps.map(x=>x.id));setParts(p=>p.filter(x=>!ids.has(x.id)));},1100);
  };

  useEffect(()=>{
    if(screen!=="playing"){clearInterval(timerR.current);return;}
    if(noTimer) return;
    timerR.current=setInterval(()=>{
      setTimeLeft(t=>{if(t<=1){clearInterval(timerR.current);return 0;}return t-1;});
      setMomentum(m=>{const nm=Math.max(0,m-2.2);if(nm===0)setNinja(false);return nm;});
    },1000);
    return()=>clearInterval(timerR.current);
  },[screen,stageId,noTimer]);

  useEffect(()=>{
    if(screen==="playing"&&timeLeft===0&&!noTimer) setTimeout(()=>setScreen("score"),350);
  },[timeLeft,screen,noTimer]);

  useEffect(()=>{
    if(screen!=="playing"||transR.current||tiles.length===0) return;
    const rem=tiles.filter(t=>t.isCorrect&&t.state==="idle");
    if(rem.length===0){
      sfx.clear(); setTrans(true);
      const capturedStageId=stageR.current;
      const capturedChallIdx=challR.current;
      const st=STAGES[capturedStageId];
      const ni=capturedChallIdx+1;
      const allDone=ni>=st.challenges.length;
      const early=capturedStageId<=3;
      flash(allDone?"STAGE COMPLETE!":early?rand(PRAISE):"ROUND CLEAR!",allDone?"#00ffee":early?"#ffd700":"#00ffee");
      setTimeout(()=>{
        if(stageR.current!==capturedStageId) return;
        if(allDone){
          setTrans(false);
          if(window.speechSynthesis) window.speechSynthesis.cancel();
          setScreen("score");
        } else {
          setChallIdx(ni); setRound(r=>r+1);
          setTiles(st.challenges[ni].build());
          setTrans(false);
          announce(st.challenges[ni].label, false);
        }
      },1300);
    }
  },[tiles,screen,flash]);

  const startStage=(sid,isJourney)=>{
    const st=STAGES[sid];
    setStageId(sid); setJourney(isJourney);
    setScore(0); setCombo(0); setMaxCombo(0);
    setMomentum(0); setNinja(false);
    setRound(1); setTimeLeft(st.time||90);
    setChallIdx(0); setBanner(null);
    setParts([]); setTrans(false);
    const firstLabel = st.challenges[0].label;
    setTiles(st.challenges[0].build());
    setScreen("playing");
    announce(firstLabel, true);
  };

  const handleTile=(tile)=>{
    if(tile.state!=="idle"||transR.current) return;
    if(tile.isCorrect){
      sfx.slice();
      setCombo(prev=>{
        const nc=prev+1, multi=ninjaR.current?2:1;
        setScore(s=>s+(100+nc*18)*multi);
        setMaxCombo(m=>Math.max(m,nc));
        setMomentum(mom=>{
          const nm=Math.min(100,mom+15);
          if(nm>=100&&!ninjaR.current){setNinja(true);sfx.ninja();flash("NINJA MODE!","#00ffee");}
          return nm;
        });
        const tier=getTier(nc);
        if(tier){sfx.combo(tier.tier);if(nc%3===0||nc<6)flash(tier.label,tier.color);}
        return nc;
      });
      spawnParticles(tile.id,true);
      setTiles(ts=>ts.map(t=>t.id===tile.id?{...t,state:"correct"}:t));
      setTimeout(()=>setTiles(ts=>ts.map(t=>t.id===tile.id&&t.state==="correct"?{...t,state:"cleared"}:t)),420);
    } else {
      sfx.wrong(); setCombo(0);
      setMomentum(m=>{const nm=Math.max(0,m-35);if(nm===0)setNinja(false);return nm;});
      setNinja(false); setShake(true); setTimeout(()=>setShake(false),460);
      spawnParticles(tile.id,false);
      setTiles(ts=>ts.map(t=>t.id===tile.id?{...t,state:"wrong"}:t));
      setTimeout(()=>setTiles(ts=>ts.map(t=>t.id===tile.id&&t.state==="wrong"?{...t,state:"cleared"}:t)),520);
    }
  };

  if(screen==="menu") return <GameMenuScreen onJourney={()=>startStage(0,true)} onChooseStage={()=>setScreen("stages")} onLauncher={onGoLauncher}/>;
  if(screen==="stages") return <StageSelectScreen onSelect={sid=>startStage(sid,false)} onBack={()=>setScreen("menu")}/>;
  if(screen==="score") return (
    <ScoreScreen score={score} maxCombo={maxCombo} round={round} stageId={stageId} journeyMode={journey}
      onRestart={()=>startStage(stageId,journey)}
      onNext={()=>startStage(Math.min(stageId+1,STAGES.length-1),true)}
      onMenu={()=>setScreen("menu")}
      onLauncher={onGoLauncher}
      onMarkComplete={onMarkComplete}
    />
  );

  return (
    <div ref={arenaR} style={{position:"relative",width:"100%",height:"100vh",overflow:"hidden",background:ninja?"radial-gradient(ellipse at 50% 0%,#001a2e 0%,#000d1a 55%,#000008 100%)":"radial-gradient(ellipse at 50% 0%,#1a0a2e 0%,#0a0614 55%,#020008 100%)",transition:"background 0.6s",animation:shake?"screenShake 0.45s ease":"none"}}>
      <style dangerouslySetInnerHTML={{__html:GCSS}}/>
      <StarField/>
      {ninja&&<div style={{position:"absolute",inset:0,pointerEvents:"none",zIndex:1,background:"radial-gradient(ellipse 70% 50% at 50% 50%,rgba(0,255,238,0.04) 0%,transparent 70%)",animation:"ninjaPulse 1s ease-in-out infinite"}}/>}
      <HUD score={score} combo={combo} stageName={stage.name} stageAccent={stage.accent} challNum={(challIdx%stage.challenges.length)+1} total={stage.challenges.length} timeLeft={timeLeft} noTimer={noTimer} ninjaMode={ninja} comboTier={comboTier}/>
      <MomentumBar momentum={momentum} ninjaMode={ninja}/>
      <TileProgressBar tiles={tiles} ninjaMode={ninja}/>
      <div style={{position:"absolute",top:80,left:"50%",transform:"translateX(-50%)",textAlign:"center",zIndex:20,pointerEvents:"none",maxWidth:580,padding:"0 20px"}}>
        <div style={{fontSize:9,letterSpacing:4,color:"#ccc",textTransform:"uppercase",fontFamily:'"Rajdhani",sans-serif',marginBottom:5}}>FIND AND SLASH</div>
        <div style={{fontSize:stage.hint>=2?17:15,fontWeight:700,letterSpacing:2,color:ninja?"#00ffee":"#ffd700",textShadow:ninja?"0 0 20px #00ffee":"0 0 14px rgba(255,215,0,0.4)",fontFamily:'"Cinzel",serif',lineHeight:1.35,transition:"all 0.4s"}}>{chall?chall.label.toUpperCase():""}</div>
      </div>
      
      <div ref={gridR} style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%) translateY(18px)",display:"grid",gridTemplateColumns:"repeat(5, 90px)",gap:8,zIndex:10,filter:trans?"blur(3px) brightness(0.5)":"none",transition:"filter 0.4s"}}>
        {tiles.map(tile=><Tile key={tile.id} tile={tile} ninjaMode={ninja} hintLevel={stage.hint} onClick={()=>handleTile(tile)}/>)}
      </div>
      <ParticleLayer particles={parts}/>
      {banner&&<Banner text={banner.text} color={banner.color}/>}
      <button onClick={onGoLauncher} style={{position:"absolute",top:16,left:16,zIndex:40,background:"rgba(0,0,0,0.4)",outline:"1px solid rgba(255,255,255,0.08)",border:"none",color:"#ccc",borderRadius:6,padding:"6px 12px",fontSize:9,letterSpacing:2,fontFamily:'"Rajdhani",sans-serif'}}>HOME</button>
    </div>
  );
}

                </div>

                <div style={{fontSize:8,color:"#ccc",letterSpacing:1,fontFamily:'"Rajdhani",sans-serif',marginBottom:10,lineHeight:1.5}}>{st.sub}</div>

                {played ? (
                  <div style={{borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:11,fontWeight:700,color:"#00ffee",fontFamily:'"Rajdhani",sans-serif'}}>x{stats.maxCombo||0}</div>
                        <div style={{fontSize:7,letterSpacing:2,color:"#ccc",marginTop:1}}>{rank}</div>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {st.hint>0&&<span style={{fontSize:7,background:"rgba(255,215,0,0.07)",color:"rgba(255,215,0,0.5)",border:"none",outline:"1px solid rgba(255,215,0,0.15)",borderRadius:8,padding:"2px 6px",letterSpacing:1,fontFamily:'"Rajdhani",sans-serif'}}>hints</span>}

                    <span style={{fontSize:7,color:"#777",fontFamily:'"Rajdhani",sans-serif',padding:"2px 4px",letterSpacing:1}}>{st.challenges.length} ch</span>
                  </div>
                )}

                {isHov&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,"+st.accent+",transparent)"}}/>}
              </div>
            );
          })}
        </div>

        {/* FOOTER */}
        <div style={{marginTop:48,paddingTop:20,borderTop:"1px solid rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>

            {STAGES.map(function(s){return (

                {s.icon}

      </div>
    </div>
  );
}

      </section>

      {/* ── HOW IT WORKS ── */}
      <section style={{padding:"80px 24px",background:"rgba(255,215,0,0.02)",borderTop:"1px solid rgba(255,255,255,0.04)",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
        <div style={{maxWidth:860,margin:"0 auto"}}>
          <div style={{textAlign:"center",marginBottom:56}}>
            <div style={{fontSize:8,letterSpacing:6,color:"#ccc",marginBottom:16,fontFamily:"'Orbitron',sans-serif"}}>HOW IT WORKS</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(20px,3vw,34px)",fontWeight:900,color:"#fff",letterSpacing:2}}>SLASH YOUR WAY TO MASTERY</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:32}}>
            {[
              {n:"01", title:"PICK A STAGE", desc:"Choose from 10 stages or follow the Journey from the very beginning.", color:"#ff6b6b"},
              {n:"02", title:"SLASH TILES",  desc:"Find and tap the correct tiles before time runs out. Build your combo chain.", color:"#ffd700"},
              {n:"03", title:"GO NINJA",     desc:"Fill the Momentum bar to unlock Ninja Mode — 2x score multiplier.", color:"#00ffee"},
              {n:"04", title:"LEVEL UP",     desc:"Clear all challenges and advance to the next stage with harder patterns.", color:"#cc88ff"},
            ].map(function(step,i){return (
              <div key={i} style={{animation:"fadeSlideUp 0.6s "+(0.1+i*0.1)+"s ease-out both"}}>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:32,fontWeight:900,color:step.color,opacity:0.18,marginBottom:8,letterSpacing:-2}}>{step.n}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,color:step.color,letterSpacing:3,marginBottom:10}}>{step.title}</div>
                <div style={{fontSize:11,color:"#aaa",lineHeight:1.8,letterSpacing:0.5}}>{step.desc}</div>
              </div>
            );})}
          </div>
        </div>
      </section>

      {/* ── STAGE PREVIEW STRIP ── */}
      <section style={{padding:"80px 24px",maxWidth:1100,margin:"0 auto"}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:8,letterSpacing:6,color:"#ccc",marginBottom:12,fontFamily:"'Orbitron',sans-serif"}}>ALL 10 STAGES</div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(18px,2.5vw,28px)",fontWeight:900,color:"#ccc",letterSpacing:3}}>EVERY STAGE. EVERY AGE.</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center"}}>
          {STAGES.map(function(st,i){
            const rgb = hexToRgb(st.accent);
            return (
              <div key={st.id}
                style={{
                  padding:"10px 16px",
                  borderRadius:10,
                  background:"rgba("+rgb+",0.07)",
                  border:"1px solid "+st.accent+"33",
                  display:"flex",alignItems:"center",gap:8,
                  animation:"badgePop 0.4s "+(0.05+i*0.05)+"s ease-out both",
                  opacity:0,
                }}>
                <span style={{fontSize:16}}>{st.icon}</span>
                <div>
                  <div style={{fontSize:9,fontWeight:700,color:st.accent,letterSpacing:2,fontFamily:"'Cinzel',serif"}}>{st.name}</div>
                  <div style={{fontSize:7,color:"#777",letterSpacing:2,fontFamily:"'Orbitron',sans-serif"}}>{st.sub.split("·")[1]||st.sub}</div>
                </div>
              </div>
            );
          })}
        </div>
      </section>

      {/* ── CTA ── */}
      <section style={{
        position:"relative",
        padding:"120px 24px",
        textAlign:"center",
        overflow:"hidden",
        background:"radial-gradient(ellipse at 50% 50%,rgba(255,215,0,0.04) 0%,transparent 70%)",
        borderTop:"1px solid rgba(255,255,255,0.04)",
      }}>
        <SiteStars/>
        <div style={{position:"relative",zIndex:10}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:8,letterSpacing:6,color:"#ccc",marginBottom:20}}>READY TO PLAY?</div>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:"clamp(28px,6vw,64px)",fontWeight:900,lineHeight:1.1,marginBottom:16,background:"linear-gradient(135deg,#ffd700,#ff8800 50%,#ff00cc)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
            BECOME A<br/>LEARNING NINJA
          </div>
          <p style={{fontSize:13,color:"#aaa",letterSpacing:2,marginBottom:52,maxWidth:400,margin:"0 auto 52px"}}>Free. No account needed. Works on any device. Start learning in seconds.</p>

          <button
            onClick={handleLaunch}
            style={{
              padding:"24px 80px",
              fontFamily:"'Cinzel',serif",
              fontSize:"clamp(14px,2vw,20px)",
              fontWeight:900,
              letterSpacing:6,
              cursor:"pointer",
              borderRadius:14,
              border:"none",
              background:"linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,80,0,0.1))",
              outline:"2px solid rgba(255,215,0,0.5)",
              color:"#ffd700",
              transition:"all 0.25s",
              animation:"btnHum 2.5s ease-in-out infinite",
            }}
            onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px) scale(1.04)";e.currentTarget.style.background="linear-gradient(135deg,rgba(255,215,0,0.25),rgba(255,80,0,0.18))";e.currentTarget.style.outline="2px solid rgba(255,215,0,0.9)";}}
            onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.background="linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,80,0,0.1))";e.currentTarget.style.outline="2px solid rgba(255,215,0,0.5)";}}>
            LAUNCH GAME
          </button>
        </div>
      </section>

      {/* ── FOOTER ── */}
      <footer style={{padding:"32px 40px",borderTop:"1px solid rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div style={{display:"flex",alignItems:"baseline",gap:6}}>
          <span style={{fontFamily:"'Orbitron',sans-serif",fontSize:8,fontWeight:900,letterSpacing:4,color:"rgba(255,215,0,0.3)"}}>B·EDU NINJA</span>
          <span style={{fontSize:7,letterSpacing:3,color:"#1a1a2a"}}>·  EDUCATIONAL GAME  ·  FREE TO PLAY</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          {STAGES.map(s=>(
            <span key={s.id} style={{fontSize:14,opacity:0.15}}>{s.icon}</span>
          ))}
        </div>
      </footer>

    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BEDUNinjaSite />);
  </script>
</body>
</html>
