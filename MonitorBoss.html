<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── localStorage polyfill matching the storage API ── */
window.storage = {
  get:(k)=>{ try{ const v=localStorage.getItem('mb_'+k); return Promise.resolve(v?{key:k,value:v}:null); }catch{return Promise.resolve(null);} },
  set:(k,v)=>{ try{ localStorage.setItem('mb_'+k,v); return Promise.resolve({key:k,value:v}); }catch{return Promise.resolve(null);} },
  delete:(k)=>{ try{ localStorage.removeItem('mb_'+k); return Promise.resolve({key:k,deleted:true}); }catch{return Promise.resolve(null);} }
};

/* ════════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════════ */
const SR=200, BUF_DUR=20, BUF_SZ=SR*BUF_DUR, DISP_DUR=6, N_BEDS=4, ROUND_SECS=300;
const gauss=(x,mu=0,sig=1)=>Math.exp(-0.5*((x-mu)/sig)**2);
const rnd=(a,b)=>a+Math.random()*(b-a);
const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ════════════════════════════════════════════════
   RHYTHM DATABASE
════════════════════════════════════════════════ */
const R={

    rA:1,qA:.08,sA:.22,qrsW:.08,tA:.28,tW:.13,noise:.02,fib:0,

  SBRAD:{id:"SBRAD",name:"Sinus Bradycardia",cat:"Sinus",sev:"benign",alarmCol:"#eab308",
    hr:[38,59],reg:true,rrVar:.04,pA:.25,pW:.09,pr:.18,pInv:false,
    rA:1,qA:.1,sA:.25,qrsW:.08,tA:.35,tW:.18,noise:.02,fib:0,
    info:"Rate <60 bpm · Regular rhythm · Upright P waves · Monitor for hemodynamic instability",
    keyFeatures:["Rate <60 bpm","Regular rhythm","Upright P waves","Narrow QRS","Prolonged RR interval"]},
  AFIB:{id:"AFIB",name:"Atrial Fibrillation",cat:"Atrial",sev:"concerning",alarmCol:"#f97316",
    hr:[80,145],reg:false,rrVar:.35,pA:0,pW:0,pr:0,pInv:false,
    rA:.85,qA:.08,sA:.2,qrsW:.08,tA:.28,tW:.14,noise:.05,fib:.1,
    info:"Irregularly irregular rhythm · No identifiable P waves · Fibrillatory baseline · Variable RR intervals",
    keyFeatures:["No P waves","Irregularly irregular","Fibrillatory baseline","Variable RR","Narrow QRS (usually)"]},
  AFLT:{id:"AFLT",name:"Atrial Flutter",cat:"Atrial",sev:"concerning",alarmCol:"#f97316",
    isFlutter:true,flutRate:300,hr:[75,155],reg:true,rrVar:.02,pA:0,pW:0,pr:0,pInv:false,
    rA:.9,qA:.08,sA:.2,qrsW:.08,tA:0,tW:0,noise:.02,fib:0,
    info:"\"Sawtooth\" flutter waves at ~300/min · Regular ventricular rate · 2:1 or 4:1 AV block",
    keyFeatures:["Sawtooth flutter waves","Regular ventricular rate","2:1 or 4:1 block","~300 atrial rate","No isoelectric baseline"]},
  SVT:{id:"SVT",name:"SVT / PSVT",cat:"Atrial",sev:"concerning",alarmCol:"#f97316",
    hr:[160,220],reg:true,rrVar:.01,pA:0,pW:0,pr:0,pInv:false,
    rA:.95,qA:.05,sA:.15,qrsW:.07,tA:-.22,tW:.1,noise:.02,fib:0,
    info:"Rate 160–220 bpm · Narrow QRS · P waves buried in T wave · Abrupt onset/termination",
    keyFeatures:["Rate 160–220 bpm","Narrow QRS","Retrograde/buried P waves","Regular","Abrupt onset"]},
  JNC:{id:"JNC",name:"Junctional Rhythm",cat:"Junctional",sev:"concerning",alarmCol:"#f97316",
    hr:[40,60],reg:true,rrVar:.03,pA:.15,pW:.06,pr:.1,pInv:true,
    rA:.9,qA:.08,sA:.2,qrsW:.08,tA:.3,tW:.15,noise:.02,fib:0,
    info:"Rate 40–60 bpm · Absent or inverted P waves · Narrow QRS · AV node acting as pacemaker",
    keyFeatures:["Rate 40–60 bpm","Inverted/absent P waves","Narrow QRS","Regular","AV node pacemaker"]},
  VT:{id:"VT",name:"Ventricular Tachycardia",cat:"Ventricular",sev:"dangerous",alarmCol:"#ef4444",
    hr:[150,250],reg:true,rrVar:.02,pA:0,pW:0,pr:0,pInv:false,
    rA:1.5,qA:0,sA:.5,qrsW:.18,tA:-.5,tW:.2,noise:.03,fib:0,
    info:"Rate 150–250 bpm · WIDE QRS >0.12s · No P waves · AV dissociation · May deteriorate to VF",
    keyFeatures:["Rate 150–250 bpm","Wide QRS >0.12s","No identifiable P waves","Regular","Bizarre QRS morphology"]},
  VF:{id:"VF",name:"Ventricular Fibrillation",cat:"Ventricular",sev:"lethal",alarmCol:"#dc2626",

    info:"Chaotic waveform · No P/QRS/T · No cardiac output · 🚨 DEFIBRILLATE IMMEDIATELY",
    keyFeatures:["Chaotic irregular waveform","No P waves","No QRS complexes","No T waves","No cardiac output"]},

    isAsystole:true,hr:[0,0],reg:true,rrVar:0,pA:0,rA:0,tA:0,noise:.02,fib:0,
    info:"Flat line · No electrical activity · No cardiac output · 🚨 START CPR IMMEDIATELY",
    keyFeatures:["Flat line","No electrical activity","No cardiac output","Isoelectric baseline","Occasional artifact only"]},
  CHB:{id:"CHB",name:"3rd Degree Heart Block",cat:"Blocks",sev:"dangerous",alarmCol:"#ef4444",
    is3AVB:true,pRate:70,hr:[30,45],reg:true,rrVar:.03,pA:.22,pW:.08,pr:0,pInv:false,
    rA:.9,qA:.1,sA:.35,qrsW:.14,tA:.38,tW:.22,noise:.02,fib:0,
    info:"P waves march through at ~70/min · Wide escape QRS at 30–45/min · Complete AV dissociation · Pacemaker required",
    keyFeatures:["P rate ~70 independent of QRS","Wide escape QRS","Rate 30–45 bpm","AV dissociation","Requires pacemaker"]},
  MOBITZ2:{id:"MOBITZ2",name:"2nd Degree Block (Mobitz II)",cat:"Blocks",sev:"dangerous",alarmCol:"#ef4444",
    isMobitz2:true,hr:[35,60],reg:false,rrVar:.02,pA:.22,pW:.08,pr:.18,pInv:false,
    rA:.95,qA:.1,sA:.25,qrsW:.1,tA:.35,tW:.17,noise:.02,fib:0,
    info:"Constant PR · Periodic dropped QRS · May progress to complete block · Requires pacemaker",
    keyFeatures:["Constant PR interval","Sudden dropped QRS","Regular P waves","Narrow or wide QRS","May progress to CHB"]},

const MENU=[
  {cat:"Sinus",       color:"#22c55e", ids:["NSR","STACH","SBRAD"]},
  {cat:"Atrial",      color:"#fbbf24", ids:["AFIB","AFLT","SVT"]},
  {cat:"Junctional",  color:"#a78bfa", ids:["JNC"]},
  {cat:"Ventricular", color:"#ef4444", ids:["VT","VF","ASY"]},
  {cat:"Blocks",      color:"#f97316", ids:["CHB","MOBITZ2"]},
];

const DIFF={
  beginner:    {pool:["NSR","STACH","SBRAD","AFIB","VT","VF","ASY"],          label:"Beginner",    intv:[15,25],desc:"7 rhythms · 15–25s"},
  intermediate:{pool:["NSR","STACH","SBRAD","AFIB","AFLT","JNC","VT","VF","ASY"],label:"Intermediate",intv:[12,20],desc:"9 rhythms · 12–20s"},
  advanced:    {pool:Object.keys(R),                                           label:"Advanced",    intv:[7,14], desc:"All 12 rhythms · 7–14s"},
};

const SEV_COL={normal:"#22c55e",benign:"#84cc16",concerning:"#fbbf24",dangerous:"#ef4444",lethal:"#dc2626"};
const SEV_LABEL={normal:"Normal",benign:"Benign",concerning:"Concerning",dangerous:"⚠️ Dangerous",lethal:"🚨 Lethal"};

/* ════════════════════════════════════════════════
   WAVEFORM GENERATOR
════════════════════════════════════════════════ */
function buildBuf(r,seed=0){
  const buf=new Float32Array(BUF_SZ);
  if(r.isVF){
    for(let i=0;i<BUF_SZ;i++){
      const t=i/SR,env=.65+.35*Math.sin(2*Math.PI*.38*t+seed);
      buf[i]=env*(.7*Math.sin(2*Math.PI*5.3*t+seed*1.1)+.45*Math.sin(2*Math.PI*7.9*t+seed*2.3)+
        .3*Math.sin(2*Math.PI*11.4*t+seed*.7)+.22*Math.sin(2*Math.PI*3.1*t+seed*3.2)+
        .16*Math.sin(2*Math.PI*17.2*t+seed*1.5)+.1*Math.sin(2*Math.PI*23.7*t+seed*.9));
    } return buf;
  }
  if(r.isAsystole){
    for(let i=0;i<BUF_SZ;i++) buf[i]=Math.sin(i*.007+seed)*.009+Math.sin(i*.031+seed*2)*.005;
    return buf;
  }
  const beats=[];
  if(r.is3AVB){
    const pRR=Math.round(SR*60/r.pRate),qRR=Math.round(SR*60/((r.hr[0]+r.hr[1])/2));
    for(let s=Math.round(pRR*.3);s<BUF_SZ;s+=pRR) beats.push({s,t:"P"});
    for(let s=Math.round(qRR*.7);s<BUF_SZ;s+=qRR) beats.push({s,t:"Q"});
  } else if(r.isMobitz2){
    const pRR=Math.round(SR*60/70),qrsInterval=Math.round(pRR*3);
    for(let s=Math.round(pRR*.3);s<BUF_SZ;s+=pRR) beats.push({s,t:"P"});
    for(let s=Math.round(qrsInterval*.5);s<BUF_SZ;s+=qrsInterval) beats.push({s,t:"Q"});
  } else if(r.isFlutter){
    const fRR=Math.round(SR*60/r.flutRate),qRR=Math.round(SR*60/((r.hr[0]+r.hr[1])/2));
    for(let s=5;s<BUF_SZ;s+=fRR) beats.push({s,t:"F"});
    for(let s=Math.round(qRR*.5);s<BUF_SZ;s+=qRR) beats.push({s,t:"Q"});
  } else {
    const hr=Math.max((r.hr[0]+r.hr[1])/2,10),baseRR=SR*60/hr;
    let s=Math.round(baseRR*.15),bi=0;
    while(s<BUF_SZ){
      beats.push({s,t:"A"});
      let rr=r.reg?baseRR*(1+Math.sin(bi*1.7+seed)*(r.rrVar||.03)):baseRR*(.52+Math.abs(Math.sin(bi*6.1+seed*3.7))*.96);
      s+=Math.max(Math.round(rr),Math.round(SR*.28)); bi++;
    }
  }
  for(const beat of beats){
    const cs=beat.s;
    if(beat.t==="F"){
      const fw=Math.round(.195*SR);
      for(let i=0;i<fw&&cs+i<BUF_SZ;i++){const ph=i/fw;buf[cs+i]+=ph<.65?-.28*(ph/.65):.28*((1-ph)/.35);}
      continue;
    }
    const doP=r.pA&&r.pA!==0&&(beat.t==="A"||beat.t==="P");
    const doQRS=r.rA&&r.rA!==0&&(beat.t==="A"||beat.t==="Q");
    if(doP){
      const pW=(r.pW||.08)*SR,prW=(r.pr||.16)*SR,pAmp=r.pInv?-(r.pA):r.pA,pc=cs-Math.round(prW),sp=Math.ceil(pW*2.8);
      for(let i=-sp;i<=sp;i++){const si=pc+i;if(si>=0&&si<BUF_SZ) buf[si]+=pAmp*gauss(i,0,pW*.38);}
    }
    if(doQRS){
      const qW=(r.qrsW||.08)*SR;
      if(r.qA>0){const qo=-Math.round(qW*.55);for(let i=qo-9;i<=qo+9;i++){const si=cs+i;if(si>=0&&si<BUF_SZ)buf[si]-=r.qA*gauss(i,qo,qW*.18);}}
      const rs=qW*.3,rsp=Math.ceil(rs*3.8);
      for(let i=-rsp;i<=rsp;i++){const si=cs+i;if(si>=0&&si<BUF_SZ)buf[si]+=r.rA*gauss(i,0,rs);}
      if(r.sA>0){const so=Math.round(qW*.55);for(let i=so-8;i<=so+12;i++){const si=cs+i;if(si>=0&&si<BUF_SZ)buf[si]-=r.sA*gauss(i,so,qW*.2);}}
      if(r.tA&&r.tA!==0){
        const tW=(r.tW||.16)*SR,tc=Math.round(cs+qW*.85+tW*1.05),ts=tW*.45,tsp=Math.ceil(ts*3.2);
        for(let i=-tsp;i<=tsp;i++){const si=tc+i;if(si>=0&&si<BUF_SZ)buf[si]+=r.tA*gauss(i,0,ts);}
      }
    }
  }
  const n=r.noise||.02;
  for(let i=0;i<BUF_SZ;i++) buf[i]+=n*(Math.sin(i*.009+seed*5)*.5+Math.sin(i*.047+seed*1.3)*.3+Math.sin(i*.233+seed)*.15+Math.sin(i*.611+seed*2.1)*.05);
  if(r.fib>0){
    for(let i=0;i<BUF_SZ;i++){
      const t=i/SR;
      buf[i]+=r.fib*(.45*Math.sin(2*Math.PI*6.1*t+seed)+.3*Math.sin(2*Math.PI*9.7*t+seed*1.3)+.2*Math.sin(2*Math.PI*14.2*t+seed*.8)+.12*Math.sin(2*Math.PI*21.5*t+seed*2.1))*.38;
    }
  }
  return buf;
}

/* ════════════════════════════════════════════════
   ECG CANVAS PAINTER
════════════════════════════════════════════════ */
function paintECG(canvas,buf,pos,sev,isSelected){
  if(!canvas||!buf) return;
  const ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  ctx.fillStyle="#020e07"; ctx.fillRect(0,0,W,H);
  const gm=W/30;
  ctx.lineWidth=.4; ctx.strokeStyle="#051a0d";
  for(let x=0;x<=W;x+=gm){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=gm){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.lineWidth=.7; ctx.strokeStyle="#092b17";
  for(let x=0;x<=W;x+=gm*5){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=gm*5){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const dispSamp=DISP_DUR*SR,midY=H*.5,scl=H*.265;
  const col=sev==="lethal"?"#ff2040":sev==="dangerous"?"#ff8800":sev==="concerning"?"#fbbf24":"#00e87a";
  ctx.beginPath(); ctx.strokeStyle=col; ctx.lineWidth=isSelected?2.2:1.8;
  ctx.shadowBlur=isSelected?14:9; ctx.shadowColor=col; ctx.lineJoin="round";
  for(let px=0;px<W;px++){
    const si=(Math.floor(pos)+Math.floor(px/W*dispSamp))%BUF_SZ;
    const y=midY-clamp(buf[si],-2.5,2.5)*scl;
    px===0?ctx.moveTo(px,y):ctx.lineTo(px,y);
  }
  ctx.stroke(); ctx.shadowBlur=0;
}

/* ════════════════════════════════════════════════
   SCORING
════════════════════════════════════════════════ */
function calcPts(correct,rhythm,timeSec,streak){
  if(!correct) return{pts:-5,msg:"−5  Incorrect"};
  let pts=10,extra="";
  if(timeSec<4){pts+=5;extra+=" ⚡Fast!";}else if(timeSec<9){pts+=2;extra+=" Quick";}
  const ns=streak+1;
  if(ns>=7){pts+=15;extra+=" 🔥×7 MEGA!";}else if(ns>=5){pts+=10;extra+=" 🔥×5 STREAK!";}else if(ns>=3){pts+=5;extra+=" 🔥×3";}
  if(rhythm.sev==="lethal"||rhythm.sev==="dangerous"){pts+=3;extra+=" ⚠️+3";}
  return{pts,msg:`+${pts}${extra}  Correct!`};
}

/* ════════════════════════════════════════════════
   MINI ECG (static snapshot)
════════════════════════════════════════════════ */
function MiniECG({rhythmId,height=40,seed}){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    const buf=buildBuf(R[rhythmId],(seed||0)+Math.random()*200);
    const ctx=c.getContext("2d");
    ctx.fillStyle="#020e07"; ctx.fillRect(0,0,c.width,c.height);
    const r=R[rhythmId],col=r.sev==="lethal"?"#ff2040":r.sev==="dangerous"?"#ff8800":r.sev==="concerning"?"#fbbf24":"#00e87a";
    const midY=c.height/2,scl=c.height*.30;
    ctx.beginPath(); ctx.strokeStyle=col; ctx.lineWidth=1.8;
    ctx.shadowBlur=6; ctx.shadowColor=col;
    const dispS=Math.min(4*SR,BUF_SZ);
    for(let px=0;px<c.width;px++){
      const si=Math.floor(px/c.width*dispS);
      const y=midY-clamp(buf[si],-2.5,2.5)*scl;
      px===0?ctx.moveTo(px,y):ctx.lineTo(px,y);
    }
    ctx.stroke();
  },[rhythmId,seed]);
  return <canvas ref={ref} width={280} height={height} style={{display:"block",width:"100%",height:`${height}px`,borderRadius:"4px"}}/>;
}

                  {i+1}. {s.heading.split(' ').slice(0,3).join(' ')}…
                </button>
              ))}

                className={`nav-tab ${quizAns!==null?"active":""}`} style={{color:quizAns!==null?"#fbbf24":undefined}}>
                📝 Quiz
              </button>}

            {/* Section content */}
            {!showQuiz&&(
              <div className="animate-fadeIn">
                <div className="rounded-xl p-4 mb-4" style={{background:"#020c07",border:"1px solid #1a3a1a"}}>
                  <h3 className="text-sm font-black mb-3" style={{color:"#22c55e"}}>{section.heading}</h3>
                  <p className="text-sm leading-relaxed" style={{color:"#7aaa8a"}}>{section.body}</p>

                      📺 Rhythm Reference — {lesson.title}
                    </div>
                    <div className="p-3 grid gap-2" style={{gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))"}}>
                      {previewRhythms.map((rid,i)=>{
                        const r=R[rid];
                        return(
                          <div key={rid} className="rounded-lg p-2.5 tut-card"
                            style={{background:"#030f08",border:`1px solid ${SEV_COL[r.sev]}33`}}>
                            <div className="flex items-center justify-between mb-1.5">
                              <span className="text-xs font-bold" style={{color:SEV_COL[r.sev]}}>{r.name}</span>
                              <span className="text-xs px-1.5 py-0.5 rounded"
                                style={{background:SEV_COL[r.sev]+"18",color:SEV_COL[r.sev],border:`1px solid ${SEV_COL[r.sev]}40`,fontSize:"10px"}}>
                                {r.sev}
                              </span>
                            </div>
                            <MiniECG rhythmId={rid} height={44} seed={i*333}/>
                            <div className="mt-2">
                              {(r.keyFeatures||[]).slice(0,3).map((f,fi)=>(
                                <div key={fi} className="text-xs mt-0.5" style={{color:"#2a6a3a"}}>· {f}</div>

                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Nav buttons */}
                <div className="flex items-center gap-3">
                  {sectionIdx>0&&(
                    <button onClick={()=>{setSectionIdx(s=>s-1);setQuizAns(null);}}
                      className="px-4 py-2 rounded-xl text-sm font-bold transition hover:opacity-80"
                      style={{border:"1px solid #1a4a22",color:"#3a8a5a"}}>← Prev</button>
                  )}
                  <button onClick={goNext}
                    className="flex-1 py-2.5 rounded-xl text-sm font-bold transition hover:opacity-90"
                    style={{background:"linear-gradient(135deg,#22c55e,#15803d)",color:"#020e07"}}>
                    {isLastSection&&lesson.quiz?"Take Quiz →":isLastSection&&isLastLesson?"✓ Finish":isLastSection?"Next Lesson →":"Next Section →"}
                  </button>
                </div>
              </div>
            )}

            {/* Quiz */}
            {showQuiz&&!quizDone&&(
              <div className="animate-fadeIn">
                <div className="rounded-xl p-4 mb-4" style={{background:"#020c07",border:"1px solid #1a4a22"}}>
                  <div className="text-xs font-bold mb-3 tracking-wider" style={{color:"#fbbf24"}}>📝 QUICK CHECK</div>
                  <p className="text-sm font-bold mb-4" style={{color:"#a0c0a8"}}>{lesson.quiz.question}</p>
                  <div className="space-y-2">
                    {lesson.quiz.options.map((opt,i)=>(
                      <button key={i} onClick={()=>setQuizAns(i)}
                        className="w-full text-left px-4 py-3 rounded-xl text-sm transition"
                        style={{background:"#030e07",border:"1px solid #1a3a1a",color:"#7aaa8a"}}
                        onMouseEnter={e=>Object.assign(e.currentTarget.style,{background:"#0a2a15",borderColor:"#22c55e44"})}
                        onMouseLeave={e=>Object.assign(e.currentTarget.style,{background:"#030e07",borderColor:"#1a3a1a"})}>
                        <span style={{color:"#2a6a3a"}}>{String.fromCharCode(65+i)}.</span> {opt}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Quiz result */}
            {quizDone&&(
              <div className="animate-fadeIn">
                <div className={`rounded-xl p-4 mb-4 ${quizAns===lesson.quiz.answer?"bg-green-950/60":"bg-red-950/60"}`}
                  style={{border:`1px solid ${quizAns===lesson.quiz.answer?"#22c55e55":"#ef444455"}`}}>
                  <div className="font-black text-sm mb-2" style={{color:quizAns===lesson.quiz.answer?"#22c55e":"#ef4444"}}>
                    {quizAns===lesson.quiz.answer?"✓ Correct!":"✗ Not quite — review the lesson above"}
                  </div>
                  <p className="text-sm" style={{color:"#a0c0a8"}}>
                    {quizAns===lesson.quiz.answer?"Great work! ":`The correct answer is: `}
                    <span style={{color:"#22c55e",fontWeight:700}}>
                      {lesson.quiz.options[lesson.quiz.answer]}
                    </span>
                  </p>
                </div>
                <div className="flex gap-3">
                  <button onClick={()=>{setSectionIdx(0);setQuizAns(null);}}
                    className="px-4 py-2.5 rounded-xl text-sm font-bold transition hover:opacity-80"
                    style={{border:"1px solid #1a4a22",color:"#3a8a5a"}}>↩ Review</button>
                  <button onClick={()=>{
                    markComplete(lessonIdx);
                    if(!isLastLesson){setLessonIdx(l=>l+1);setSectionIdx(0);setQuizAns(null);}
                    else onBack();
                  }} className="flex-1 py-2.5 rounded-xl text-sm font-bold transition hover:opacity-90"
                    style={{background:"linear-gradient(135deg,#22c55e,#15803d)",color:"#020e07"}}>
                    {isLastLesson?"🎓 Finish Training":"Next Lesson →"}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function LeaderboardScreen({onBack,currentPlayer}){
  const [lb,setLb]=useState([]);
  const [filterDiff,setFilterDiff]=useState("all");

  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get("lb_v3");if(r) setLb(JSON.parse(r.value));}catch{}
    })();
  },[]);

  function clearLb(){
    if(window.confirm("Clear all scores? This cannot be undone.")) {
      window.storage.delete("lb_v3").catch(()=>{});
      setLb([]);
    }
  }

  const filtered=filterDiff==="all"?lb:lb.filter(e=>e.diff===filterDiff);
  const top=filtered.slice(0,20);
  const myBest=lb.filter(e=>e.name===currentPlayer).sort((a,b)=>b.score-a.score)[0];

  const medals=["🥇","🥈","🥉"];

  return(
    <div className="min-h-screen flex flex-col" style={{background:"#010a05",fontFamily:"monospace"}}>
      <div className="flex items-center justify-between px-4 py-3 shrink-0"
        style={{background:"#020d06",borderBottom:"1px solid #0d2818"}}>
        <div className="flex items-center gap-3">
          <button onClick={onBack} className="text-xs px-3 py-1.5 rounded-lg transition hover:opacity-80"
            style={{border:"1px solid #1a4a22",color:"#3a8a5a"}}>← Back</button>
          <span className="text-sm font-black" style={{color:"#22c55e"}}>🏆 HALL OF FAME</span>
        </div>
        <button onClick={clearLb} className="text-xs px-3 py-1.5 rounded-lg transition hover:opacity-80"
          style={{border:"1px solid #7f1d1d",color:"#7f3030"}}>Clear All</button>
      </div>

      <div className="flex-1 overflow-y-auto p-4">
        <div className="max-w-lg mx-auto">
          {/* Personal best */}
          {myBest&&(
            <div className="rounded-xl p-4 mb-5 animate-fadeIn"
              style={{background:"#22c55e0a",border:"1px solid #22c55e33"}}>
              <div className="text-xs font-bold mb-2 tracking-wider" style={{color:"#22c55e"}}>⭐ YOUR PERSONAL BEST</div>
              <div className="flex items-end justify-between">
                <div>
                  <div className="text-3xl font-black" style={{color:"#22c55e",textShadow:"0 0 20px #22c55e44"}}>{myBest.score}</div>
                  <div className="text-xs mt-1" style={{color:"#3a8a5a"}}>{myBest.name} · {myBest.diff} · {myBest.date}</div>
                </div>
                <div className="text-4xl">🏅</div>
              </div>
            </div>
          )}

          {/* Filter */}
          <div className="flex gap-2 mb-4 flex-wrap">
            {["all","beginner","intermediate","advanced"].map(d=>(
              <button key={d} onClick={()=>setFilterDiff(d)}
                className={`nav-tab ${filterDiff===d?"active":""}`} style={{textTransform:"capitalize"}}>
                {d==="all"?"All Modes":d}
              </button>
            ))}
          </div>

          {/* Table */}
          <div className="rounded-xl overflow-hidden" style={{border:"1px solid #1a4a22"}}>
            <div className="flex items-center justify-between px-4 py-2 text-xs font-bold"
              style={{background:"#020c07",color:"#3a8a5a",borderBottom:"1px solid #1a3a20"}}>
              <span>PLAYER</span>
              <div className="flex gap-6">
                <span>DIFF</span>
                <span>DATE</span>
                <span>SCORE</span>
              </div>
            </div>
            {top.length===0?(
              <div className="py-12 text-center text-sm" style={{color:"#1a5a2a"}}>
                No scores yet. Play a game to appear here!
              </div>
            ):top.map((e,i)=>{
              const isMe=e.name===currentPlayer;
              return(
                <div key={i} className={`lb-row ${isMe?"me":""}`}>
                  <div className="flex items-center gap-2">
                    <span style={{color:i<3?"transparent":"#1a5a2a",fontSize:"16px",width:"24px"}}>
                      {i<3?medals[i]:`${i+1}`}
                    </span>
                    {i<3&&<span style={{fontSize:"16px",marginLeft:"-24px",width:"24px"}}>{medals[i]}</span>}
                    <span style={{color:isMe?"#22c55e":"#4a8a6a"}}>{e.name}</span>
                    {isMe&&<span className="text-xs" style={{color:"#22c55e55"}}>← you</span>}
                  </div>
                  <div className="flex items-center gap-6 text-xs">
                    <span className="capitalize" style={{color:"#2a6a3a",minWidth:"80px",textAlign:"right"}}>{e.diff||"?"}</span>
                    <span style={{color:"#1a5a2a",minWidth:"72px",textAlign:"right"}}>{e.date}</span>
                    <span className="font-black" style={{color:isMe?"#22c55e":"#3a8a5a",minWidth:"48px",textAlign:"right"}}>{e.score}</span>
                  </div>
                </div>
              );
            })}
          </div>

          {lb.length>20&&<p className="text-xs text-center mt-3" style={{color:"#1a5a2a"}}>Showing top 20 of {lb.length} scores</p>}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════════ */
function MonitorBoss(){
  const [screen,setScreen]=useState("menu");
  const [diff,setDiff]=useState("beginner");
  const [playerName,setPlayerName]=useState(()=>{ try{return localStorage.getItem('mb_playername')||"";}catch{return "";} });
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);
  const [timeLeft,setTimeLeft]=useState(ROUND_SECS);
  const [beds,setBeds]=useState([]);
  const [selBed,setSelBed]=useState(null);
  const [expandedCat,setExpandedCat]=useState(null);
  const [feedbacks,setFeedbacks]=useState({});
  const [notifs,setNotifs]=useState([]);
  const [leaderboard,setLeaderboard]=useState([]);
  const [stats,setStats]=useState({correct:0,incorrect:0,missed:0});
  const [blinkState,setBlinkState]=useState(true);

  const canvasRefs=useRef(Array.from({length:N_BEDS},()=>({current:null})));
  const bufs=useRef(new Array(N_BEDS).fill(null));
  const posRef=useRef(new Array(N_BEDS).fill(0));
  const bedsRef=useRef([]);
  const scoreRef=useRef(0);
  const streakRef=useRef(0);
  const statsRef=useRef({correct:0,incorrect:0,missed:0});
  const feedbacksR=useRef({});
  const selBedRef=useRef(null);
  const animRef=useRef(null);
  const lastTsRef=useRef(null);
  const injRef=useRef(null);
  const gameTmrRef=useRef(null);
  const blinkRef=useRef(null);

  useEffect(()=>{selBedRef.current=selBed;},[selBed]);

  // Persist player name
  useEffect(()=>{
    try{localStorage.setItem('mb_playername',playerName);}catch{}
  },[playerName]);

  // Load leaderboard
  useEffect(()=>{
    (async()=>{try{const r=await window.storage.get("lb_v3");if(r) setLeaderboard(JSON.parse(r.value));}catch{}})();
  },[]);

  async function saveLB(name,sc){
    const entry={name:name||"Anonymous",score:sc,date:new Date().toLocaleDateString(),diff};
    setLeaderboard(prev=>{
      const next=[...prev,entry].sort((a,b)=>b.score-a.score).slice(0,50);
      window.storage.set("lb_v3",JSON.stringify(next)).catch(()=>{});
      return next;
    });
  }

  function addNotif(msg,col="#22c55e"){
    const id=Date.now()+Math.random();
    setNotifs(p=>[...p,{id,msg,col}]);
    setTimeout(()=>setNotifs(p=>p.filter(n=>n.id!==id)),3000);
  }

  function initGame(){
    const init=Array.from({length:N_BEDS},(_,i)=>({id:i,rhythm:R.NSR,injectedAt:Date.now()-9e5,answered:true}));
    bedsRef.current=init; setBeds([...init]);
    bufs.current=init.map((_,i)=>buildBuf(R.NSR,i*200+7));
    posRef.current=new Array(N_BEDS).fill(0);
    scoreRef.current=0; setScore(0);
    streakRef.current=0; setStreak(0);
    statsRef.current={correct:0,incorrect:0,missed:0}; setStats({correct:0,incorrect:0,missed:0});
    feedbacksR.current={}; setFeedbacks({});
    setSelBed(null); setExpandedCat(null); setNotifs([]);
    setTimeLeft(ROUND_SECS);
    setScreen("game");
  }

  // Animation loop
  useEffect(()=>{
    if(screen!=="game") return;
    lastTsRef.current=null;
    const animate=ts=>{
      if(!lastTsRef.current) lastTsRef.current=ts;
      const dt=Math.min((ts-lastTsRef.current)/1000,.05);
      lastTsRef.current=ts;
      for(let i=0;i<N_BEDS;i++){
        posRef.current[i]=(posRef.current[i]+dt*SR)%BUF_SZ;
        const canvas=canvasRefs.current[i]?.current;
        const bed=bedsRef.current[i];
        if(canvas&&bufs.current[i]&&bed) paintECG(canvas,bufs.current[i],posRef.current[i],bed.rhythm.sev,selBedRef.current===i);
      }
      animRef.current=requestAnimationFrame(animate);
    };
    animRef.current=requestAnimationFrame(animate);
    return()=>{ if(animRef.current) cancelAnimationFrame(animRef.current); };
  },[screen]);

  // Blink
  useEffect(()=>{
    if(screen!=="game") return;
    blinkRef.current=setInterval(()=>setBlinkState(b=>!b),600);
    return()=>clearInterval(blinkRef.current);
  },[screen]);

  // Game timer
  useEffect(()=>{
    if(screen!=="game") return;
    gameTmrRef.current=setInterval(()=>setTimeLeft(t=>{if(t<=1){endGame();return 0;}return t-1;}),1000);
    return()=>clearInterval(gameTmrRef.current);
  },[screen]);

  // Rhythm injector
  useEffect(()=>{
    if(screen!=="game") return;
    const cfg=DIFF[diff];
    function inject(){
      bedsRef.current.forEach(bed=>{
        if(!bed.answered&&(bed.rhythm.sev==="dangerous"||bed.rhythm.sev==="lethal")){
          const pen=bed.rhythm.sev==="lethal"?-15:-10;
          scoreRef.current=Math.max(0,scoreRef.current+pen);
          setScore(scoreRef.current);
          streakRef.current=0; setStreak(0);
          statsRef.current.missed++; setStats({...statsRef.current});
          addNotif(`${pen} Missed ${bed.rhythm.sev==="lethal"?"💀":"⚠️"} ${bed.rhythm.name}`,"#dc2626");
        }
      });
      const bidx=Math.floor(Math.random()*N_BEDS);
      const pool=cfg.pool.filter(id=>id!==bedsRef.current[bidx]?.rhythm?.id);
      const newR=R[pool[Math.floor(Math.random()*pool.length)]];
      const newBed={...bedsRef.current[bidx],rhythm:newR,injectedAt:Date.now(),answered:false};
      const nb=[...bedsRef.current]; nb[bidx]=newBed;
      bedsRef.current=nb; setBeds([...nb]);
      bufs.current[bidx]=buildBuf(newR,Math.random()*9999);
      delete feedbacksR.current[bidx]; setFeedbacks({...feedbacksR.current});
      if(selBedRef.current===bidx){setSelBed(null);setExpandedCat(null);}
      const [mn,mx]=cfg.intv;
      injRef.current=setTimeout(inject,rnd(mn,mx)*1000);
    }
    const [mn,mx]=cfg.intv;
    injRef.current=setTimeout(inject,rnd(mn,mx)*1000);
    return()=>clearTimeout(injRef.current);
  },[screen,diff]);

  function endGame(){
    clearInterval(gameTmrRef.current);
    clearTimeout(injRef.current);
    if(animRef.current) cancelAnimationFrame(animRef.current);
    lastTsRef.current=null;
    saveLB(playerName,scoreRef.current);
    setScreen("summary");
  }

  function handleAnswer(rhythmId){
    const bed=bedsRef.current[selBed];
    if(!bed||feedbacksR.current[selBed]||bed.answered) return;
    const correct=rhythmId===bed.rhythm.id;
    const tSec=(Date.now()-bed.injectedAt)/1000;
    const{pts,msg}=calcPts(correct,bed.rhythm,tSec,streakRef.current);
    scoreRef.current=Math.max(0,scoreRef.current+pts); setScore(scoreRef.current);
    if(correct){streakRef.current++;statsRef.current.correct++;}else{streakRef.current=0;statsRef.current.incorrect++;}
    setStreak(streakRef.current); setStats({...statsRef.current});
    const nb=[...bedsRef.current]; nb[selBed]={...bed,answered:true};
    bedsRef.current=nb; setBeds([...nb]);
    const fb={correct,msg,rhythm:bed.rhythm};
    feedbacksR.current[selBed]=fb; setFeedbacks({...feedbacksR.current});
    addNotif(msg,correct?"#22c55e":"#ef4444");
  }

  /* ──── SCREENS ──── */
  if(screen==="tutorial") return <TutorialScreen onBack={()=>setScreen("menu")}/>;
  if(screen==="leaderboard") return <LeaderboardScreen onBack={()=>setScreen("menu")} currentPlayer={playerName||"Anonymous"}/>;

  /* ──── MENU ──── */
  if(screen==="menu"){
    const topScores=leaderboard.slice(0,5);
    return(
      <div className="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden"
        style={{background:"radial-gradient(ellipse at 50% 60%, #041a0c 0%, #010a05 100%)",fontFamily:"monospace"}}>
        <div className="absolute inset-0 pointer-events-none" style={{
          backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,80,.015) 2px,rgba(0,255,80,.015) 4px)",zIndex:0}}/>
        <div className="relative z-10 w-full max-w-sm">
          {/* Logo */}
          <div className="text-center mb-7">
            <div className="text-5xl mb-2">🫀</div>
            <h1 className="font-black mb-1" style={{fontSize:"2rem",color:"#00e87a",textShadow:"0 0 30px #22c55e88",letterSpacing:".06em",lineHeight:1}}>
              MONITOR<span style={{color:"#16a34a"}}>BOSS</span>
            </h1>
            <p className="text-xs tracking-widest" style={{color:"#2a6a3a"}}>TELEMETRY TRAINING SIMULATOR</p>
          </div>

          {/* Callsign */}
          <div className="mb-4">
            <label className="block text-xs mb-1.5 tracking-wider" style={{color:"#2a6a3a"}}>CALLSIGN</label>
            <input value={playerName} onChange={e=>setPlayerName(e.target.value)}
              placeholder="Enter your name…"
              className="w-full px-4 py-2.5 rounded-xl text-sm outline-none transition"
              style={{background:"#030e07",border:"1px solid #1a4a22",color:"#a0d0a8"}}
              onFocus={e=>e.target.style.borderColor="#22c55e"}
              onBlur={e=>e.target.style.borderColor="#1a4a22"}/>
          </div>

          {/* Difficulty */}
          <div className="mb-5">
            <label className="block text-xs mb-2 tracking-wider" style={{color:"#2a6a3a"}}>DIFFICULTY</label>
            <div className="grid grid-cols-3 gap-2">
              {Object.entries(DIFF).map(([key,{label,desc}])=>(
                <button key={key} onClick={()=>setDiff(key)}
                  className="py-2.5 px-2 rounded-xl text-xs font-bold transition-all"
                  style={{
                    background:diff===key?"#22c55e18":"#030e07",
                    border:`1px solid ${diff===key?"#22c55e":"#1a4a22"}`,
                    color:diff===key?"#22c55e":"#3a7a4a",
                    boxShadow:diff===key?"0 0 15px #22c55e22":"none"
                  }}>{label}</button>
              ))}
            </div>
            <p className="text-xs mt-2 text-center" style={{color:"#1a5a2a"}}>{DIFF[diff].desc}</p>
          </div>

          {/* Scoring */}
          <div className="rounded-xl p-3 mb-4 text-xs" style={{background:"#020c07",border:"1px solid #1a3a1a"}}>
            <div className="text-center font-bold mb-2" style={{color:"#3a8a5a",letterSpacing:".1em"}}>SCORING</div>
            <div className="grid grid-cols-2 gap-x-4 gap-y-1" style={{color:"#2a6a3a"}}>
              <span>✓ Correct ID</span>        <span style={{color:"#22c55e"}}>+10 pts</span>
              <span>⚡ Fast (&lt;4s)</span>    <span style={{color:"#22c55e"}}>+5 bonus</span>
              <span>🔥 ×3 streak</span>        <span style={{color:"#fbbf24"}}>+5 pts</span>
              <span>🔥 ×5 streak</span>        <span style={{color:"#fbbf24"}}>+10 pts</span>
              <span>✗ Wrong answer</span>      <span style={{color:"#ef4444"}}>−5 pts</span>
              <span>⚠️ Miss dangerous</span>   <span style={{color:"#ef4444"}}>−10 pts</span>
              <span>🚨 Miss lethal</span>      <span style={{color:"#dc2626"}}>−15 pts</span>
            </div>
          </div>

          {/* Action buttons */}
          <button onClick={initGame}
            className="w-full py-3.5 rounded-xl font-black text-base transition hover:scale-[1.02] active:scale-[0.98] mb-3"
            style={{background:"linear-gradient(135deg,#22c55e,#15803d)",color:"#020e07",
              boxShadow:"0 0 40px #22c55e44,0 4px 20px #00000060",letterSpacing:".1em"}}>
            ▶ START MONITORING
          </button>

          <div className="grid grid-cols-2 gap-2 mb-5">
            <button onClick={()=>setScreen("tutorial")}
              className="py-2.5 rounded-xl text-sm font-bold transition hover:opacity-80"
              style={{border:"1px solid #1a6a3a",color:"#3a9a5a",background:"#020c07"}}>
              📚 Training
            </button>
            <button onClick={()=>setScreen("leaderboard")}
              className="py-2.5 rounded-xl text-sm font-bold transition hover:opacity-80"
              style={{border:"1px solid #4a4a1a",color:"#8a8a3a",background:"#020c07"}}>
              🏆 Leaderboard
            </button>
          </div>

          {/* Mini leaderboard */}
          {topScores.length>0&&(
            <div className="rounded-xl overflow-hidden" style={{border:"1px solid #1a4a22"}}>
              <div className="px-4 py-2 flex items-center justify-between"
                style={{background:"#020c07",borderBottom:"1px solid #1a3a20"}}>
                <span className="text-xs font-bold tracking-wider" style={{color:"#3a8a5a"}}>🏆 TOP SCORES</span>
                <button onClick={()=>setScreen("leaderboard")} className="text-xs transition hover:opacity-70"
                  style={{color:"#2a6a3a"}}>See all →</button>
              </div>
              {topScores.map((e,i)=>(
                <div key={i} className="flex items-center justify-between px-4 py-1.5 text-xs"
                  style={{borderTop:i>0?"1px solid #0d2818":"none",color:"#2a6a3a"}}>
                  <span>
                    <span style={{color:i===0?"#fbbf24":i===1?"#94a3b8":"#92400e"}}>#{i+1}</span>
                    {" "}{e.name}
                    <span className="ml-1 opacity-50">[{e.diff||"?"}]</span>
                  </span>
                  <span className="font-bold" style={{color:"#22c55e"}}>{e.score}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ──── GAME ──── */
  if(screen==="game"){
    const alarmBeds=beds.filter(b=>!b.answered&&(b.rhythm.sev==="dangerous"||b.rhythm.sev==="lethal"));
    return(
      <div className="min-h-screen flex flex-col" style={{background:"#010a05",fontFamily:"monospace"}}>
        {/* Top bar */}
        <div className="flex items-center justify-between px-4 py-2 shrink-0"
          style={{background:"#020d06",borderBottom:"1px solid #0d2818"}}>
          <div className="flex items-center gap-2">
            <span className="text-sm font-black" style={{color:"#22c55e"}}>🫀 MONITOR BOSS</span>
            <span className="text-xs px-2 py-0.5 rounded" style={{background:"#0a2a10",color:"#2a7a3a",border:"1px solid #1a4a1a"}}>{DIFF[diff].label}</span>
            {playerName&&<span className="text-xs" style={{color:"#1a5a2a"}}>// {playerName}</span>}
          </div>
          <div className="flex items-center gap-4 text-xs">
            {alarmBeds.length>0&&(
              <span className="font-bold px-2 py-0.5 rounded transition-opacity"
                style={{color:"#dc2626",border:"1px solid #dc262688",background:"#dc262615",opacity:blinkState?1:.3}}>
                🚨 {alarmBeds.length} ALARM{alarmBeds.length>1?"S":""}
              </span>
            )}
            <span style={{color:"#fbbf24"}}>🔥 ×{streak}</span>
            <span className="font-bold text-base" style={{color:"#22c55e"}}>{score} pts</span>
            <span className={`font-bold ${timeLeft<60?"text-red-400":timeLeft<120?"text-yellow-400":"text-green-600"}`}
              style={{minWidth:"48px",textAlign:"right"}}>⏱ {fmt(timeLeft)}</span>
            <span style={{color:"#1a5a2a"}}>✓{stats.correct} ✗{stats.incorrect}</span>
            <button onClick={endGame} className="text-xs px-2 py-0.5 rounded transition hover:opacity-80"
              style={{border:"1px solid #7f1d1d",color:"#7f3030"}}>END</button>
          </div>
        </div>

        <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-2 p-2">
          {beds.map((bed,i)=>{
            const isAlarm=!bed.answered&&(bed.rhythm.sev==="dangerous"||bed.rhythm.sev==="lethal");
            const alarmCol=bed.rhythm.alarmCol;
            return(
              <div key={i} onClick={()=>{setSelBed(i);setExpandedCat(null);}}
                className="relative rounded-xl overflow-hidden cursor-pointer transition-all duration-150"
                style={{
                  border:`2px solid ${selBed===i?"#60a5fa":isAlarm?alarmCol:"#0d2818"}`,
                  boxShadow:selBed===i?"0 0 20px #60a5fa44":isAlarm?`0 0 20px ${alarmCol}44`:"none",
                }}>
                {isAlarm&&<div className="absolute inset-0 pointer-events-none transition-opacity duration-300"
                  style={{background:alarmCol+"08",opacity:blinkState?1:0,zIndex:1}}/>}
                <BedVitals bed={bed}/>
                <canvas
                  ref={el=>{if(canvasRefs.current[i]) canvasRefs.current[i].current=el;}}
                  width={900} height={140}
                  style={{display:"block",width:"100%",height:"140px"}}/>
                <div className="flex items-center justify-between px-3 py-1 text-xs"
                  style={{background:"#010a05",borderTop:"1px solid #0a1e0f",color:"#0f3a1a"}}>
                  <span>Lead II · 25mm/s · 1mV/cm</span>
                  {feedbacksR.current[i]?(
                    <span style={{color:feedbacksR.current[i].correct?"#22c55e55":"#ef444455"}}>
                      {feedbacksR.current[i].correct?"✓ Correct":"✗ Wrong"}
                    </span>
                  ):!bed.answered?(
                    <span style={{color:"#1a5a2a"}}>▶ Click to identify</span>
                  ):(
                    <span style={{color:"#0f3a1a"}}>Awaiting change…</span>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        <div className="fixed top-14 right-4 space-y-2 pointer-events-none z-40">
          {notifs.map(n=><Notif key={n.id} notif={n}/>)}
        </div>

        {selBed!==null&&beds[selBed]&&(
          <AnswerPopup bed={beds[selBed]} onAnswer={handleAnswer}
            onClose={()=>{setSelBed(null);setExpandedCat(null);}}
            expandedCat={expandedCat} setExpandedCat={setExpandedCat}
            feedback={feedbacksR.current[selBed]}/>
        )}
      </div>
    );
  }

  /* ──── SUMMARY ──── */
  if(screen==="summary"){
    const total=stats.correct+stats.incorrect+stats.missed;
    const acc=total?Math.round(stats.correct/total*100):0;
    const grade=acc>=90?{g:"A",col:"#22c55e"}:acc>=75?{g:"B",col:"#84cc16"}:acc>=60?{g:"C",col:"#fbbf24"}:acc>=40?{g:"D",col:"#f97316"}:{g:"F",col:"#ef4444"};
    const myName=playerName||"Anonymous";
    const myRank=leaderboard.findIndex(e=>e.name===myName&&e.score===scoreRef.current);
    const isHighScore=myRank===0;

    return(
      <div className="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden"
        style={{background:"radial-gradient(ellipse at 50% 40%, #041a0c 0%, #010a05 100%)",fontFamily:"monospace"}}>
        <div className="relative z-10 w-full max-w-md">
          <div className="text-center mb-6">
            {isHighScore&&<div className="text-2xl mb-2 animate-pulse">🏆 NEW HIGH SCORE! 🏆</div>}
            <p className="text-xs tracking-widest mb-2" style={{color:"#2a6a3a"}}>SESSION COMPLETE</p>
            <div className="text-6xl font-black mb-1" style={{color:"#22c55e",textShadow:"0 0 40px #22c55e66"}}>
              {scoreRef.current}
            </div>
            <p className="text-sm" style={{color:"#3a8a5a"}}>points · {myName}</p>
            {myRank>=0&&<p className="text-xs mt-1" style={{color:"#fbbf24"}}>#{myRank+1} on Leaderboard</p>}
          </div>

          <div className="grid grid-cols-4 gap-2 mb-5">
            <div className="rounded-xl p-3 text-center" style={{background:grade.col+"14",border:`1px solid ${grade.col}44`}}>
              <div className="text-3xl font-black" style={{color:grade.col}}>{grade.g}</div>
              <div className="text-xs mt-0.5" style={{color:grade.col+"99"}}>Grade</div>
            </div>
            {[{label:"Correct",val:stats.correct,col:"#22c55e"},{label:"Wrong",val:stats.incorrect,col:"#ef4444"},{label:"Missed",val:stats.missed,col:"#f97316"}].map(({label,val,col})=>(
              <div key={label} className="rounded-xl p-3 text-center" style={{background:col+"11",border:`1px solid ${col}44`}}>
                <div className="text-2xl font-black" style={{color}}>{val}</div>
                <div className="text-xs mt-0.5" style={{color:col+"99"}}>{label}</div>
              </div>
            ))}
          </div>

          <div className="text-center mb-5">
            <span className="text-sm" style={{color:"#3a8a5a"}}>Accuracy: </span>
            <span className="text-sm font-bold" style={{color:grade.col}}>{acc}%</span>
            <span className="text-xs ml-3" style={{color:"#1a5a2a"}}>({total} rhythms)</span>
          </div>

          {/* Reference panel */}
          <div className="rounded-xl overflow-hidden mb-5" style={{border:"1px solid #1a3a1a"}}>
            <div className="px-4 py-2 text-xs font-bold tracking-wider" style={{background:"#020c07",color:"#3a8a5a"}}>📖 RHYTHM REFERENCE</div>
            <div className="p-2 grid grid-cols-2 gap-2">
              {Object.values(R).slice(0,6).map((r,i)=>(
                <div key={r.id} className="rounded-lg p-2" style={{background:"#020c07",border:"1px solid #1a2a1a"}}>
                  <div className="text-xs font-bold mb-1" style={{color:SEV_COL[r.sev]}}>{r.name}</div>
                  <MiniECG rhythmId={r.id} height={36} seed={i*111}/>
                </div>
              ))}
            </div>
          </div>

          {/* Top scores */}
          {leaderboard.length>0&&(
            <div className="rounded-xl overflow-hidden mb-5" style={{border:"1px solid #1a4a22"}}>
              <div className="px-4 py-2 flex items-center justify-between"
                style={{background:"#020c07",borderBottom:"1px solid #1a3a20"}}>
                <span className="text-xs font-bold tracking-wider" style={{color:"#3a8a5a"}}>🏆 TOP SCORES</span>
                <button onClick={()=>setScreen("leaderboard")} className="text-xs transition hover:opacity-70"
                  style={{color:"#2a6a3a"}}>Full board →</button>
              </div>
              {leaderboard.slice(0,5).map((e,i)=>{
                const isMe=e.name===myName&&e.score===scoreRef.current;
                return(
                  <div key={i} className="lb-row" style={{background:isMe?"#22c55e0a":"transparent",borderLeft:isMe?"2px solid #22c55e44":"none"}}>
                    <span style={{color:isMe?"#22c55e":"#2a6a3a"}}>
                      <span style={{color:i===0?"#fbbf24":i===1?"#94a3b8":i===2?"#92400e":"#2a6a3a"}}>#{i+1}</span>
                      {" "}{e.name}
                      {isMe&&<span style={{color:"#22c55e55"}}> ← YOU</span>}
                    </span>
                    <span style={{color:isMe?"#22c55e":"#3a8a5a",fontWeight:isMe?"bold":"normal"}}>{e.score}</span>
                  </div>
                );
              })}
            </div>
          )}

          <div className="grid grid-cols-3 gap-2">
            <button onClick={()=>setScreen("menu")} className="py-2.5 rounded-xl text-sm font-bold transition hover:opacity-80"
              style={{border:"1px solid #1a4a22",color:"#3a8a5a",background:"#030e07"}}>← Menu</button>
            <button onClick={()=>setScreen("leaderboard")} className="py-2.5 rounded-xl text-sm font-bold transition hover:opacity-80"
              style={{border:"1px solid #4a4a1a",color:"#8a8a3a",background:"#030e07"}}>🏆 Board</button>
            <button onClick={initGame} className="py-2.5 rounded-xl text-sm font-bold transition hover:opacity-90"
              style={{background:"linear-gradient(135deg,#22c55e,#15803d)",color:"#020e07"}}>▶ Again</button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<MonitorBoss/>);
  </script>
</body>
</html>
